<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Brasileirão 2026 — Almoço de Sexta</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a2027;
    --card-hover: #232a33;
    --border: #2a3340;
    --text: #e6e9ed;
    --text-secondary: #8b95a3;
    --text-tertiary: #5a6573;
    --accent: #4ade80;
    --accent-dim: #16432a;
    --danger: #f87171;
    --danger-dim: #4a1a1a;
    --warning: #fbbf24;
    --warning-dim: #4a3a0f;
    --info: #60a5fa;
    --info-dim: #1a3050;
    --gold: #fbbf24;
    --silver: #cbd5e1;
    --bronze: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); }
  .nav { display: flex; gap: 6px; flex-wrap: wrap; }
  .nav button, .btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 0.15s;
  }
  .nav button:hover, .btn:hover { background: var(--card-hover); }
  .nav button.active { background: var(--info-dim); border-color: var(--info); color: var(--info); }
  .btn-primary { background: var(--info-dim); border-color: var(--info); color: var(--info); }
  .btn-danger { color: var(--danger); }
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--text-secondary);
    flex-wrap: wrap;
    gap: 8px;
  }
  .status-ok { color: var(--accent); }
  .status-loading { color: var(--warning); }
  .status-error { color: var(--danger); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 10px 14px; text-align: left; }
  thead th {
    background: rgba(255,255,255,0.02);
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:first-child { border-top: none; }
  tbody tr.clickable { cursor: pointer; }
  tbody tr.clickable:hover { background: var(--card-hover); }
  .pos-medal {
    display: inline-block;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    text-align: center;
    line-height: 28px;
    font-weight: 600;
    font-size: 12px;
    color: #000;
  }
  .pos-1 { background: var(--gold); }
  .pos-2 { background: var(--silver); }
  .pos-3 { background: var(--bronze); }
  .pos-other { background: var(--card-hover); color: var(--text-secondary); border: 1px solid var(--border); }
  .total {
    font-weight: 600;
    font-size: 16px;
    text-align: right;
  }
  .zona-rebaixamento { background: rgba(248,113,113,0.05); }
  .zona-libertadores { background: rgba(74,222,128,0.04); }
  .detail-row { background: rgba(96,165,250,0.04); }
  .detail-row td { padding: 0; }
  .detail-content { padding: 12px 16px; }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
    font-size: 12px;
    margin-top: 6px;
  }
  .detail-grid > div {
    background: var(--card);
    padding: 8px 10px;
  }
  .detail-grid .header {
    background: rgba(255,255,255,0.02);
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-success { background: var(--accent-dim); color: var(--accent); }
  .badge-info { background: var(--info-dim); color: var(--info); }
  .badge-danger { background: var(--danger-dim); color: var(--danger); }
  .badge-warning { background: var(--warning-dim); color: var(--warning); }
  .badge-coracao { background: rgba(244,114,182,0.15); color: #f472b6; }
  .empty { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }
  /* Modais */
  .modal-backdrop {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; z-index: 100;
  }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 18px; margin-bottom: 16px; font-weight: 600; }
  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-weight: 500;
  }
  input, select {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--info);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 100px;
    gap: 8px;
  }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .legenda {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-tertiary);
    flex-wrap: wrap;
  }
  .legenda-item { display: flex; align-items: center; gap: 6px; }
  .legenda-dot { width: 10px; height: 10px; border-radius: 2px; }
  @media (max-width: 720px) {
    body { padding: 8px; }
    h1 { font-size: 20px; }
    th, td { padding: 8px 10px; font-size: 13px; }
    .detail-grid { grid-template-columns: 1fr 1fr 1fr; }
    .detail-grid .desktop-only { display: none; }
  }
  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--warning);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Ranking compacto estilo planilha */
  .ranking-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    background: var(--card);
  }
  .ranking-table thead th {
    background: rgba(255,255,255,0.04);
    color: var(--text-secondary);
    font-weight: 500;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ranking-table thead th.sticky-col,
  .ranking-table tbody td.sticky-col {
    position: sticky;
    background: var(--card);
    z-index: 2;
  }
  .ranking-table thead th.col-pos { width: 76px; text-align: center; left: 0; }
  .ranking-table thead th.col-nome { text-align: left; padding-left: 10px; min-width: 130px; }
  .ranking-table thead th.col-total {
    background: rgba(74,222,128,0.08);
    color: var(--accent);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .ranking-table thead .group-header {
    background: rgba(255,255,255,0.02);
    color: var(--text-tertiary);
    font-size: 9px;
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
  }
  .ranking-table thead .group-header.coracao { background: rgba(244,114,182,0.08); color: #f472b6; }
  .ranking-table thead .group-header.cai { background: rgba(251,191,36,0.08); color: var(--warning); }
  .ranking-table tbody td {
    padding: 6px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    text-align: center;
    vertical-align: middle;
  }
  .ranking-table tbody td.col-nome {
    text-align: left;
    padding-left: 10px;
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  .ranking-table tbody td.col-total {
    background: rgba(74,222,128,0.05);
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .ranking-table tbody td.cell-coracao { background: rgba(244,114,182,0.04); }
  .ranking-table tbody td.cell-cai { background: rgba(251,191,36,0.04); }
  .cell-time {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.2;
    margin-bottom: 1px;
  }
  .cell-pts {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }
  .cell-pts.acerto { color: var(--accent); }
  .cell-palp {
    font-size: 9px;
    color: var(--text-tertiary);
    margin-top: 1px;
    letter-spacing: 0.3px;
  }
  .cell-palp.acerto {
    color: var(--accent);
    font-weight: 600;
  }
  .cell-palp.acerto::before { content: "✓ "; }
  .ranking-table .pos-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    background: var(--card-hover);
    color: var(--text-secondary);
  }
  .ranking-table .pos-num.gold { background: var(--gold); color: #000; }
  .ranking-table .pos-num.silver { background: var(--silver); color: #000; }
  .ranking-table .pos-num.bronze { background: var(--bronze); color: #000; }

  /* Linhas com destaque (BOB e divisão pagantes) */
  .ranking-table tbody tr.bob-row td { background: rgba(244,114,182,0.10) !important; }
  .ranking-table tbody tr.bob-row td.col-nome { color: #f472b6; }
  .ranking-table tbody tr.bob-row td.cell-coracao { background: rgba(244,114,182,0.18) !important; }
  .ranking-table tbody tr.bob-row td.cell-cai { background: rgba(244,114,182,0.14) !important; }
  .ranking-table tbody tr.bob-row td.col-total { background: rgba(244,114,182,0.18) !important; color: #f472b6 !important; }

  .divisor-row td {
    background: linear-gradient(90deg, var(--danger-dim) 0%, transparent 100%) !important;
    padding: 8px 14px !important;
    text-align: left !important;
    font-size: 11px;
    font-weight: 600;
    color: var(--danger);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-top: 2px solid var(--danger);
    border-bottom: 2px solid var(--danger) !important;
  }

  .secao-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 16px 0 8px;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .secao-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .secao-header .legenda-cores {
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .secao-header .leg-item { display: flex; align-items: center; gap: 5px; }
  .secao-header .leg-dot { width: 10px; height: 10px; border-radius: 2px; }

  .ranking-wrapper {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: auto;
    background: var(--card);
    max-width: 100%;
  }

  @media (max-width: 720px) {
    .ranking-table { font-size: 11px; }
    .ranking-table thead th { font-size: 9px; padding: 6px 4px; }
    .ranking-table tbody td { padding: 5px 4px; }
    .ranking-table tbody td.col-nome { font-size: 11px; padding-left: 6px; max-width: 90px; }
    .cell-time { font-size: 10px; }
    .cell-pts { font-size: 12px; }
    .cell-palp { font-size: 8px; }
  }

  /* PRÓXIMOS JOGOS */
  .dia-header {
    margin-top: 18px;
    margin-bottom: 8px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--accent);
    background: rgba(74,222,128,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 4px;
  }
  .jogos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 10px;
  }
  .jogo-card {
    background: var(--card);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .jogo-horario {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    letter-spacing: 1px;
  }
  .jogo-times {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
  }
  .jogo-time {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
    min-width: 0;
  }
  .jogo-escudo {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .jogo-escudo img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .escudo-fallback {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--card-hover);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .jogo-nome {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    word-break: break-word;
    max-width: 100%;
  }
  .jogo-vs {
    font-size: 13px;
    color: var(--text-tertiary);
    font-weight: 600;
    padding: 0 4px;
  }
  .jogo-detalhes {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .jogo-detalhe {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.4;
  }
  @media (max-width: 720px) {
    .jogos-grid { grid-template-columns: 1fr; }
    .jogo-horario { font-size: 16px; }
    .jogo-escudo, .escudo-fallback { width: 38px; height: 38px; }
    .jogo-nome { font-size: 12px; }
  }

  /* SETAS DE MOVIMENTO ENTRE RODADAS */
  .seta-mov {
    display: inline-flex;
    align-items: center;
    gap: 1px;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    margin: 0 4px;
    line-height: 1;
    white-space: nowrap;
    vertical-align: middle;
  }
  .seta-up {
    color: var(--accent);
    background: rgba(74,222,128,0.10);
  }
  .seta-down {
    color: var(--danger);
    background: rgba(248,113,113,0.10);
  }
  /* Container que segura medalha + seta no ranking */
  .pos-com-seta {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  @media (max-width: 720px) {
    .seta-mov { font-size: 9px; padding: 1px 3px; margin: 0 2px; }
  }

  /* RESULTADOS */
  .resultados-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin: 16px 0 12px;
    padding: 0 4px;
  }
  .resultados-titulo-area {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .resultados-filtro {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .select-filtro {
    background: var(--card);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    min-width: 180px;
  }
  .select-filtro:focus {
    outline: none;
    border-color: var(--info);
  }
  .btn-limpar-filtro {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-limpar-filtro:hover {
    background: var(--card-hover);
    color: var(--text);
  }
  .resultados-stats {
    background: var(--card);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .resultados-stats .stat-v { color: var(--accent); }
  .resultados-stats .stat-e { color: var(--text); }
  .resultados-stats .stat-d { color: var(--danger); }
  .resultados-lista {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .resultado-card {
    background: var(--card);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 70px 1fr auto;
    gap: 12px;
    align-items: center;
  }
  .resultado-card.resultado-vitoria { border-left: 3px solid var(--accent); background: rgba(74,222,128,0.05); }
  .resultado-card.resultado-empate { border-left: 3px solid var(--text-tertiary); }
  .resultado-card.resultado-derrota { border-left: 3px solid var(--danger); background: rgba(248,113,113,0.05); }

  .resultado-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    font-size: 11px;
  }
  .resultado-rodada {
    font-weight: 600;
    color: var(--info);
    background: rgba(96,165,250,0.10);
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  .resultado-data {
    color: var(--text-tertiary);
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  .resultado-jogo {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
  }
  .resultado-time {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .resultado-time.mandante { justify-content: flex-end; }
  .resultado-time.visitante { justify-content: flex-start; }
  .resultado-nome {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .resultado-escudo {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .resultado-escudo img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .escudo-fallback-pequeno {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--card-hover);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .resultado-placar {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
    white-space: nowrap;
    text-align: center;
    min-width: 60px;
  }
  .resultado-placar .placar-x {
    color: var(--text-tertiary);
    font-size: 14px;
    margin: 0 2px;

async function buscarTabelaTerra() {
  // Anti-cache forte: evita o navegador/CDN reutilizar tabela.json antigo.
  const url = `${URL_TABELA_LOCAL}?nocache=${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const resp = await fetch(url, {
    cache: 'no-store',
    headers: {
      'Cache-Control': 'no-cache',
      'Pragma': 'no-cache'
    }
  });

  if (!resp.ok) {
    throw new Error("Não consegui ler o tabela.json (HTTP " + resp.status + "). Verifique se o arquivo existe no repositório.");
  }
  const data = await resp.json();
  if (!data || !Array.isArray(data.tabela)) {
    throw new Error("Formato inválido de tabela.json");
  }
  if (data.tabela.length !== 20) {
    throw new Error("Tabela com " + data.tabela.length + " times, esperado 20");
  }

  // Guarda quando o SERVIDOR atualizou a tabela. Esta é a hora verdadeira do GitHub Actions.
  state._atualizadoEmServidor = data.atualizado_em || null;
  state._fonteServidor = data.fonte || "—";
  return data.tabela;
}

function proximaAtualizacaoProgramada(base = new Date()) {
  const agora = new Date(base);
  const candidatos = [];

  // Gera candidatos para a hora atual e a próxima hora.
  for (let acrescimoHora = 0; acrescimoHora <= 1; acrescimoHora++) {
    for (const minuto of MINUTOS_ATUALIZACAO) {
      const d = new Date(agora);
      d.setHours(agora.getHours() + acrescimoHora, minuto, SEGUNDO_ATUALIZACAO, 0);
      if (d > agora) candidatos.push(d);
    }
  }

  candidatos.sort((a, b) => a - b);
  return candidatos[0];
}

function formatarSomenteHora(d) {
  if (!d) return '—';
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function formatarHora(d) {
  if (!d) return '—';
  return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function setStatus(tipo, msg) {
  const el = document.getElementById('status-text');
  if (!el) return;
  el.className = 'status-' + tipo;
  if (tipo === 'loading') {
    el.innerHTML = '<span class="spinner"></span>' + msg;
  } else if (tipo === 'ok') {
    el.innerHTML = '✓ ' + msg;
  } else {
    el.innerHTML = '⚠ ' + msg;
  }
}

function mensagemStatusAtualizacao() {
  if (state._atualizadoEmServidor) {
    const dt = new Date(state._atualizadoEmServidor);
    return `Tabela atualizada em ${formatarHora(dt)} (fonte: ${state._fonteServidor || '—'})`;
  }
  return `Atualizado agora · ${formatarHora(state.ultimaAtualizacao)}`;
}

function agendarProximaAtualizacao() {
  if (timerAtualizacao) clearTimeout(timerAtualizacao);

  const proxima = proximaAtualizacaoProgramada();
  if (!proxima) return;

  const atraso = Math.max(1000, proxima.getTime() - Date.now());
  timerAtualizacao = setTimeout(async () => {
    await refresh(true);
    agendarProximaAtualizacao();
  }, atraso);
}

// ========================================================================
// CARREGAMENTO PRINCIPAL
// ========================================================================
async function inicializar() {
  // 1. Participantes: do localStorage ou padrão
  if (!carregarParticipantes()) {
    state.participantes = JSON.parse(JSON.stringify(PARTICIPANTES_INICIAIS));
    salvarParticipantes();
  }
  // 1b. Membros do grupo: tenta carregar membros.json do servidor primeiro,
  // depois localStorage, depois lista padrão.
  if (!carregarMembros()) {
    state.membros = JSON.parse(JSON.stringify(MEMBROS_INICIAIS));
    salvarMembros();
  }
  // 1c. Membros TUPAL: mesma lógica
  if (!carregarMembrosTupal()) {
    state.membrosTupal = JSON.parse(JSON.stringify(MEMBROS_TUPAL_INICIAIS));
    salvarMembrosTupal();
  }
  // Carregamento assíncrono dos JSONs do servidor (atualiza se for mais novo)
  carregarMembrosDoServidor();
  carregarMembrosTupalDoServidor();

  // 2. Fonte de verdade: sempre buscar o tabela.json do servidor ao abrir a página.
  // O cache local só é usado como plano B se a busca falhar.
  const cache = carregarCache();
  if (cache) {
    state._cacheBackup = cache;
  }

  await refresh();
  agendarProximaAtualizacao();
}

async function refresh(silencioso = false) {
  if (refreshEmAndamento) return;
  refreshEmAndamento = true;

  if (!silencioso) setStatus('loading', 'Carregando tabela...');
  try {
    const tabela = await buscarTabelaTerra();
    state.tabela = tabela;
    state.ultimaAtualizacao = new Date();
    salvarCache(tabela);
    setStatus('ok', mensagemStatusAtualizacao());
    render();
  } catch(e) {
    console.error(e);

    // Só aqui usamos o cache local, para não mostrar dado antigo como se fosse atual.
    const cache = state._cacheBackup || carregarCache();
    if (state.tabela.length === 0 && cache && Array.isArray(cache.tabela)) {
      state.tabela = cache.tabela;
      state.ultimaAtualizacao = new Date(Date.now() - cache.idadeMin * 60000);
      render();
    }

    if (state.tabela.length > 0) {
      setStatus('error', `Falha ao recarregar o tabela.json; usando cache local de ${formatarHora(state.ultimaAtualizacao)}. Erro: ${e.message}`);
    } else {
      setStatus('error', `Falha ao carregar tabela.json. ${e.message}`);
    }
  } finally {
    refreshEmAndamento = false;
  }
}

// CÁLCULOS
// ========================================================================
function dadosTime(nome) {
  return state.tabela.find(t => t.time === nome) || { pos: 0, pontos: 0 };
}

// ========================================================================
// SNAPSHOTS DE POSIÇÃO — para mostrar setas de movimento entre rodadas
// ========================================================================
// Lógica: guardamos a posição "anterior" de cada time/participante.
// Quando a rodada muda (mais jogos jogados), a posição atual vira a anterior,
// e a nova posição vira a atual. Assim mostramos quanto subiu/caiu.

function carregarSnapshot(chave) {
  try {
    const s = localStorage.getItem(chave);
    if (s) return JSON.parse(s);
  } catch (e) {}
  return null;
}

function salvarSnapshot(chave, dados) {
  try {
    localStorage.setItem(chave, JSON.stringify(dados));
  } catch (e) {}
}

// Snapshot da tabela: salva quando o número total de jogos muda (rodada nova).
// Estrutura: { jogosTotais: N, posicoesAnteriores: { "Palmeiras": 1, ... }, posicoesAtuais: {...} }
function gerenciarSnapshotTabela() {
  if (!state.tabela || state.tabela.length === 0) return null;

  const totalJogos = state.tabela.reduce((s, t) => s + (t.jogos || 0), 0);
  const posAtuais = {};
  state.tabela.forEach(t => { posAtuais[t.time] = t.pos; });

  let snap = carregarSnapshot('snapshot_tabela');

  if (!snap) {
    // Primeira vez: cria snapshot sem variação ainda
    snap = { jogosTotais: totalJogos, posicoesAnteriores: { ...posAtuais }, posicoesAtuais: posAtuais };
    salvarSnapshot('snapshot_tabela', snap);
    return snap;
  }

  // Se as posições atuais são diferentes do que estava salvo como "atuais",
  // significa que a tabela mudou desde a última visita. Promove "atuais" → "anteriores".
  const posAtuaisSalvas = snap.posicoesAtuais || {};
  let mudou = false;
  for (const time in posAtuais) {
    if (posAtuaisSalvas[time] !== posAtuais[time]) { mudou = true; break; }
  }

  if (mudou) {
    // Só atualiza "anteriores" quando entrou uma rodada nova (jogos totais aumentou de forma significativa).
    // Critério: se aumentou em pelo menos 10 jogos (uma rodada inteira tem 20 = 10 partidas × 2).
    const diffJogos = totalJogos - (snap.jogosTotais || 0);
    if (diffJogos >= 10) {
      // Rodada nova: as posições "atuais" antigas viram "anteriores"
      snap = {
        jogosTotais: totalJogos,
        posicoesAnteriores: { ...posAtuaisSalvas },
        posicoesAtuais: posAtuais
      };
    } else {
      // Mesma rodada, só atualiza "atuais" sem mexer nas "anteriores"
      snap = {
        jogosTotais: totalJogos,
        posicoesAnteriores: snap.posicoesAnteriores || posAtuais,
        posicoesAtuais: posAtuais
      };
    }
    salvarSnapshot('snapshot_tabela', snap);
  }

  return snap;
}

// Snapshot do ranking dos participantes: salva quando a tabela do brasileirão muda de rodada.
// Compara posições do ranking entre rodadas.
function gerenciarSnapshotRanking(rankingAtual) {
  if (!rankingAtual || rankingAtual.length === 0) return null;

  const totalJogosTabela = (state.tabela || []).reduce((s, t) => s + (t.jogos || 0), 0);
  const posAtuais = {};
  rankingAtual.forEach((r, i) => { posAtuais[r.nome] = i + 1; });

  let snap = carregarSnapshot('snapshot_ranking');

  if (!snap) {
    snap = {
      jogosTotaisTabela: totalJogosTabela,
      posicoesAnteriores: { ...posAtuais },
      posicoesAtuais: posAtuais
    };
    salvarSnapshot('snapshot_ranking', snap);
    return snap;
  }

  const posAtuaisSalvas = snap.posicoesAtuais || {};
  let mudou = false;
  for (const nome in posAtuais) {
    if (posAtuaisSalvas[nome] !== posAtuais[nome]) { mudou = true; break; }
  }

  if (mudou) {
    const diffJogos = totalJogosTabela - (snap.jogosTotaisTabela || 0);
    if (diffJogos >= 10) {
      snap = {
        jogosTotaisTabela: totalJogosTabela,
        posicoesAnteriores: { ...posAtuaisSalvas },
        posicoesAtuais: posAtuais
      };
    } else {
      snap = {
        jogosTotaisTabela: totalJogosTabela,
        posicoesAnteriores: snap.posicoesAnteriores || posAtuais,
        posicoesAtuais: posAtuais
      };
    }
    salvarSnapshot('snapshot_ranking', snap);
  }

  return snap;
}

// Renderiza a seta de movimento entre duas posições.
// Retorna HTML pronto. Se diff = 0, retorna string vazia.
function htmlSetaMovimento(posAnterior, posAtual) {
  if (!posAnterior || !posAtual || posAnterior === posAtual) return '';
  // Subiu: posAnterior > posAtual (ex: era 5º, agora é 3º → subiu 2)
  const diff = posAnterior - posAtual;
  if (diff > 0) {
    return `<span class="seta-mov seta-up" title="Subiu ${diff} ${diff === 1 ? 'posição' : 'posições'}">▲ ${diff}</span>`;
  } else {
    return `<span class="seta-mov seta-down" title="Caiu ${-diff} ${-diff === 1 ? 'posição' : 'posições'}">▼ ${-diff}</span>`;
  }
}

function calcular(participante) {
  const detalhes = [];
  let total = 0;

  // Time coração
  const tc = dadosTime(participante.coracao.time);
  const bonusCoracao = (tc.pos === participante.coracao.palpite) ? 12 : 0;
  total += tc.pontos + bonusCoracao;
  detalhes.push({
    tipo: 'coracao', label: '❤️ Coração',
    time: participante.coracao.time, palpite: participante.coracao.palpite,
    posAtual: tc.pos, pontos: tc.pontos, bonus: bonusCoracao
  });

  // 5 outros times
  for (const t of participante.times) {
    const td = dadosTime(t.time);
    const bonus = (td.pos === t.palpite) ? 9 : 0;
    total += td.pontos + bonus;
    detalhes.push({
      tipo: 'normal', label: 'Time',
      time: t.time, palpite: t.palpite,
      posAtual: td.pos, pontos: td.pontos, bonus: bonus
    });
  }

  // Time que cai
  const cai = dadosTime(participante.cai);
  const bonusCai = (cai.pos >= 17 && cai.pos <= 20) ? 6 : 0;
  total += bonusCai;
  detalhes.push({
    tipo: 'rebaixamento', label: '⬇️ Cai',
    time: participante.cai, palpite: '17º+',
    posAtual: cai.pos, pontos: 0, bonus: bonusCai
  });

  return { total, detalhes };
}

function renderRank() {
  if (state.tabela.length === 0) {
    document.getElementById('view-rank').innerHTML = '<div class="card empty">Carregando tabela do Brasileirão...</div>';
    return;
  }
  const ranking = state.participantes
    .map((p,i) => ({ ...p, idx:i, ...calcular(p) }))
    .sort((a,b) => b.total - a.total);

  // Limite entre não-pagantes (top 8) e pagantes (bottom 8)
  // Se tiver menos de 16, ajusta proporcionalmente
  const total = ranking.length;
  const corteNaoPagantes = Math.floor(total / 2);

  // Cabeçalho: posição | nome | total | coração | time1..5 | cai
  let html = '<div class="secao-header">';
  html += '<h2>Classificação geral</h2>';
  html += '<div class="legenda-cores">';
  html += '<div class="leg-item"><div class="leg-dot" style="background:rgba(244,114,182,0.5);"></div>Time coração (+12)</div>';
  html += '<div class="leg-item"><div class="leg-dot" style="background:rgba(251,191,36,0.5);"></div>Time que cai (+6)</div>';
  html += '<div class="leg-item"><div class="leg-dot" style="background:rgba(74,222,128,0.5);"></div>Acertou posição</div>';
  html += '</div></div>';

  html += '<div class="ranking-wrapper"><table class="ranking-table">';

  // Header com 2 linhas
  html += '<thead>';
  html += '<tr>';
  html += '<th class="col-pos" rowspan="2">#</th>';
  html += '<th class="col-nome" rowspan="2">Participante</th>';
  html += '<th class="col-total" rowspan="2">Total</th>';
  html += '<th colspan="1" class="group-header coracao">❤️ Coração</th>';
  html += '<th colspan="5" class="group-header">Times escolhidos (+9 se acertar posição)</th>';
  html += '<th colspan="1" class="group-header cai">⬇️ Cai</th>';
  html += '</tr>';
  html += '<tr>';
  html += '<th>Time</th>';
  for (let k = 1; k <= 5; k++) html += `<th>Time ${k}</th>`;
  html += '<th>Time</th>';
  html += '</tr>';
  html += '</thead><tbody>';

  // Calcula o snapshot de movimento do ranking
  const snapRank = gerenciarSnapshotRanking(ranking);
  const posAnterioresRank = (snapRank && snapRank.posicoesAnteriores) || {};

  // Linhas
  ranking.forEach((r, i) => {
    const posClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const isBob = r.nome.toUpperCase().includes('BOB');

    // Linha divisora entre não-pagantes e pagantes
    if (i === corteNaoPagantes) {
      html += `<tr class="divisor-row"><td colspan="9">⚠️ Daqui pra baixo: pagantes do almoço de fim de ano</td></tr>`;
    }

    const rowClass = isBob ? 'bob-row' : '';
    const setaRank = htmlSetaMovimento(posAnterioresRank[r.nome], i + 1);
    html += `<tr class="${rowClass}">`;
    html += `<td><span class="pos-com-seta"><span class="pos-num ${posClass}">${i+1}</span>${setaRank}</span></td>`;
    html += `<td class="col-nome">${r.nome}</td>`;
    html += `<td class="col-total">${r.total}</td>`;

    // Detalhes na ordem: coração, 5 times, cai
    r.detalhes.forEach((d, idxD) => {
      let cellClass = '';
      let cellHtml = '';
      const acertou = d.bonus > 0;

      if (d.tipo === 'coracao') {
        cellClass = 'cell-coracao';
        cellHtml = `<div class="cell-time">${d.time}</div>
          <div class="cell-pts ${acertou ? 'acerto' : ''}">${d.pontos}${acertou ? ' +12' : ''}</div>
          <div class="cell-palp ${acertou ? 'acerto' : ''}">palp ${d.palpite}º · atual ${d.posAtual || '—'}º</div>`;
      } else if (d.tipo === 'rebaixamento') {
        cellClass = 'cell-cai';
        cellHtml = `<div class="cell-time">${d.time}</div>
          <div class="cell-pts ${acertou ? 'acerto' : ''}">${acertou ? '+6' : '0'}</div>
          <div class="cell-palp ${acertou ? 'acerto' : ''}">atual ${d.posAtual || '—'}º</div>`;
      } else {
        cellHtml = `<div class="cell-time">${d.time}</div>
          <div class="cell-pts ${acertou ? 'acerto' : ''}">${d.pontos}${acertou ? ' +9' : ''}</div>
          <div class="cell-palp ${acertou ? 'acerto' : ''}">palp ${d.palpite}º · atual ${d.posAtual || '—'}º</div>`;
      }

      html += `<td class="${cellClass}">${cellHtml}</td>`;
    });

    html += `</tr>`;
  });

  html += '</tbody></table></div>';

  // Como funciona o jogo + regras
  html += `<div style="background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-top: 16px; font-size: 12px; color: var(--text-secondary);">
    <strong style="color: var(--text); display: block; margin-bottom: 8px;">Como pontua</strong>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 6px; line-height: 1.6;">
      <div>Cada célula mostra: <strong>nome do time</strong>, <strong>pontos do time</strong> + bônus (se acertou) e <strong>palpite vs posição atual</strong></div>
      <div>❤️ <strong>Coração:</strong> +12 se acertar a posição exata</div>
      <div>⚪ <strong>Demais 5 times:</strong> +9 se acertar a posição exata</div>
      <div>⬇️ <strong>Time que cai:</strong> +6 se estiver entre 17º e 20º</div>
    </div>
    <div style="margin-top:10px; padding-top:8px; border-top: 1px solid var(--border); color: var(--danger);">
      🍽️ <strong>Os ${total - corteNaoPagantes} últimos colocados pagam a conta do almoço de fim de ano.</strong>
    </div>
  </div>`;

  document.getElementById('view-rank').innerHTML = html;
}

async function carregarJogos() {
  try {
    const url = 'jogos.json?t=' + Date.now();
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    state.jogos = Array.isArray(data.jogos) ? data.jogos : [];
    state.jogosMeta = {
      atualizado_em: data.atualizado_em,
      atualizado_em_br: data.atualizado_em_br,
      fonte: data.fonte,
      rodada_atual: data.rodada_atual,
      rodadas_consultadas: data.rodadas_consultadas
    };
    state.jogosCarregados = true;
    state.jogosErro = null;
  } catch (e) {
    console.error('Erro ao carregar jogos.json:', e);
    state.jogosErro = e.message;
    state.jogosCarregados = true;
  }
  if (state.view === 'jogos') renderJogos();
}

// Helper: extrai a data calendário no fuso de Brasília a partir de um ISO.
// Retorna { ano, mes, dia, diaSemana } na data LOCAL brasileira.
// Resolve o bug de jogos noturnos serem agrupados no dia seguinte (UTC).
function dataLocalBR(dataIso) {
  if (!dataIso) return null;
  try {
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return null;
    // Usa toLocaleString com timeZone Brasil pra garantir extração no fuso correto,
    // independentemente do fuso do navegador do usuário.
    const fmt = new Intl.DateTimeFormat('pt-BR', {
      timeZone: 'America/Sao_Paulo',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      weekday: 'short'
    });
    const partes = fmt.formatToParts(d);
    const obj = {};
    for (const p of partes) {
      if (p.type !== 'literal') obj[p.type] = p.value;
    }
    // diaSemana 0..6 (dom..sab) — mapeamos a partir do weekday curto
    const mapDia = {
      'dom': 0, 'seg': 1, 'ter': 2, 'qua': 3, 'qui': 4, 'sex': 5, 'sáb': 6, 'sab': 6
    };
    const w = (obj.weekday || '').toLowerCase().replace('.', '').trim();
    const diaSemana = mapDia[w] != null ? mapDia[w] : 0;
    return {
      ano: parseInt(obj.year),
      mes: parseInt(obj.month),
      dia: parseInt(obj.day),
      diaSemana: diaSemana
    };
  } catch (e) {
    return null;
  }
}

function formatarDataAgrupada(dataIso) {
  // Devolve algo tipo "DOMINGO, 4 DE MAIO" — usando fuso de Brasília
  const d = dataLocalBR(dataIso);
  if (!d) return 'Data a definir';
  const dias = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'];
  const meses = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
  return `${dias[d.diaSemana]}, ${d.dia} DE ${meses[d.mes - 1]}`;
}

function formatarHorarioJogo(dataIso) {
  if (!dataIso) return '--:--';
  try {
    const d = new Date(dataIso);
    if (isNaN(d.getTime())) return '--:--';
    // Força fuso de Brasília no output, independente do fuso do navegador
    return d.toLocaleTimeString('pt-BR', {
      timeZone: 'America/Sao_Paulo',
      hour: '2-digit',
      minute: '2-digit'
    });
  } catch (e) {
    return '--:--';
  }
}

function chaveDataAgrupada(dataIso) {
  // Chave de agrupamento usando data NO FUSO DE BRASÍLIA, não UTC.
  // Sem isso, jogos de sábado à noite eram agrupados como domingo.
  const d = dataLocalBR(dataIso);
  if (!d) return 'zzz';
  return `${d.ano}-${String(d.mes).padStart(2,'0')}-${String(d.dia).padStart(2,'0')}`;
}

function renderJogos() {
  const container = document.getElementById('view-jogos');

  if (!state.jogosCarregados) {
    container.innerHTML = '<div class="card empty">Carregando próximos jogos...</div>';
    return;
  }

  if (state.jogosErro) {
    container.innerHTML = `<div class="card empty"><div style="color: var(--danger); margin-bottom: 6px;">⚠ Não foi possível carregar os próximos jogos</div><div style="font-size: 12px; color: var(--text-tertiary);">${state.jogosErro}</div></div>`;
    return;
  }

  if (!state.jogos || state.jogos.length === 0) {
    container.innerHTML = '<div class="card empty">Nenhum jogo futuro encontrado para a rodada atual.</div>';
    return;
  }

  // Agrupa por dia
  const grupos = {};
  for (const j of state.jogos) {
    const chave = chaveDataAgrupada(j.data_iso);
    if (!grupos[chave]) grupos[chave] = [];
    grupos[chave].push(j);
  }
  const chavesOrdenadas = Object.keys(grupos).sort();

  // Cabeçalho
  const meta = state.jogosMeta || {};
  let html = '<div class="secao-header" style="display: flex; justify-content: space-between; align-items: center;">';
  html += `<h2>Próximos jogos${meta.rodada_atual ? ' · Rodada ' + meta.rodada_atual : ''}</h2>`;
  if (meta.atualizado_em_br) {
    html += `<span style="font-size: 11px; color: var(--text-tertiary);">Atualizado em ${meta.atualizado_em_br}</span>`;
  }
  html += '</div>';

  for (const chave of chavesOrdenadas) {
    const jogos = grupos[chave];
    const labelData = formatarDataAgrupada(jogos[0].data_iso);

    html += `<div class="dia-header">${labelData}</div>`;
    html += '<div class="jogos-grid">';

    for (const j of jogos) {
      const m = j.mandante || {};
      const v = j.visitante || {};
      const escudoMandante = m.escudo
        ? `<img src="${m.escudo}" alt="${m.nome || ''}" loading="lazy">`
        : `<div class="escudo-fallback">${(m.sigla || (m.nome || '?').slice(0,3)).toUpperCase()}</div>`;
      const escudoVisitante = v.escudo
        ? `<img src="${v.escudo}" alt="${v.nome || ''}" loading="lazy">`
        : `<div class="escudo-fallback">${(v.sigla || (v.nome || '?').slice(0,3)).toUpperCase()}</div>`;

      const horario = formatarHorarioJogo(j.data_iso);

      html += `<div class="jogo-card">
        <div class="jogo-horario">${horario}</div>
        <div class="jogo-times">
          <div class="jogo-time">
            <span class="jogo-escudo">${escudoMandante}</span>
            <span class="jogo-nome">${m.nome || '?'}</span>
          </div>
          <div class="jogo-vs">×</div>
          <div class="jogo-time">
            <span class="jogo-escudo">${escudoVisitante}</span>
            <span class="jogo-nome">${v.nome || '?'}</span>
          </div>
        </div>`;

      const detalhes = [];
      if (j.estadio) detalhes.push(`<span class="jogo-detalhe">📍 ${j.estadio}</span>`);
      if (j.transmissao) detalhes.push(`<span class="jogo-detalhe">📺 ${j.transmissao}</span>`);
      if (detalhes.length > 0) {
        html += `<div class="jogo-detalhes">${detalhes.join('')}</div>`;
      }

      html += '</div>';
    }

    html += '</div>';
  }

  // Rodapé com info de fonte
  if (meta.fonte) {
    html += `<div style="text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 16px;">Fonte: ${meta.fonte}</div>`;
  }

  container.innerHTML = html;
}

async function carregarResultados() {
  try {
    const url = 'resultados.json?t=' + Date.now();
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    state.resultados = Array.isArray(data.resultados) ? data.resultados : [];
    state.resultadosTimes = Array.isArray(data.times) ? data.times : [];
    state.resultadosMeta = {
      atualizado_em: data.atualizado_em,
      atualizado_em_br: data.atualizado_em_br,
      fonte: data.fonte,
      ultima_rodada_disputada: data.ultima_rodada_disputada,
      total_resultados: data.total_resultados
    };
    state.resultadosCarregados = true;
    state.resultadosErro = null;
  } catch (e) {
    console.error('Erro ao carregar resultados.json:', e);
    state.resultadosErro = e.message;
    state.resultadosCarregados = true;
  }
  if (state.view === 'resultados') renderResultados();
}

function setFiltroResultados(time) {
  state.resultadosFiltroTime = time || '';
  renderResultados();
}

function formatarDataResultado(dataIso) {
  // Usa fuso de Brasília pra evitar bug de jogos noturnos aparecerem no dia seguinte
  const d = dataLocalBR(dataIso);
  if (!d) return '';
  const dias = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const dia = String(d.dia).padStart(2,'0');
  const mes = String(d.mes).padStart(2,'0');
  return `${dias[d.diaSemana]} ${dia}/${mes}`;
}

function renderResultados() {
  const container = document.getElementById('view-resultados');

  if (!state.resultadosCarregados) {
    container.innerHTML = '<div class="card empty">Carregando resultados...</div>';
    return;
  }

  if (state.resultadosErro) {
    container.innerHTML = `<div class="card empty"><div style="color: var(--danger); margin-bottom: 6px;">⚠ Não foi possível carregar os resultados</div><div style="font-size: 12px; color: var(--text-tertiary);">${state.resultadosErro}</div></div>`;
    return;
  }

  if (!state.resultados || state.resultados.length === 0) {
    container.innerHTML = '<div class="card empty">Nenhum resultado encontrado ainda. Aguarde a primeira atualização automática.</div>';
    return;
  }

  const meta = state.resultadosMeta || {};
  const filtroTime = state.resultadosFiltroTime;

  // Filtra resultados se houver um time selecionado
  let resultadosFiltrados = state.resultados;
  if (filtroTime) {
    resultadosFiltrados = state.resultados.filter(r =>
      (r.mandante && r.mandante.nome === filtroTime) ||
      (r.visitante && r.visitante.nome === filtroTime)
    );
  }

  // Cabeçalho com filtro
  let html = '<div class="resultados-header">';
  html += '<div class="resultados-titulo-area">';
  html += `<h2 style="font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin: 0;">Resultados${filtroTime ? ' · ' + filtroTime : ''}</h2>`;
  if (meta.atualizado_em_br) {
    html += `<span style="font-size: 11px; color: var(--text-tertiary);">Atualizado em ${meta.atualizado_em_br}</span>`;
  }
  html += '</div>';

  html += '<div class="resultados-filtro">';
  html += '<label style="font-size: 12px; color: var(--text-secondary);">Filtrar por time:</label>';
  html += `<select onchange="setFiltroResultados(this.value)" class="select-filtro">`;
  html += `<option value="" ${filtroTime === '' ? 'selected' : ''}>Todos os times</option>`;
  for (const t of state.resultadosTimes) {
    html += `<option value="${t}" ${filtroTime === t ? 'selected' : ''}>${t}</option>`;
  }
  html += '</select>';
  if (filtroTime) {
    html += '<button class="btn-limpar-filtro" onclick="setFiltroResultados(\'\')">Limpar</button>';
  }
  html += '</div>';
  html += '</div>';

  // Estatística rápida quando filtra por time
  if (filtroTime && resultadosFiltrados.length > 0) {
    let v = 0, e = 0, d = 0, gp = 0, gc = 0;
    for (const r of resultadosFiltrados) {
      const eMandante = r.mandante.nome === filtroTime;
      const meusGols = eMandante ? r.placar_mandante : r.placar_visitante;
      const golsAdv = eMandante ? r.placar_visitante : r.placar_mandante;
      gp += meusGols;
      gc += golsAdv;
      if (meusGols > golsAdv) v++;
      else if (meusGols === golsAdv) e++;
      else d++;
    }
    html += `<div class="resultados-stats">
      <span><strong>${resultadosFiltrados.length}</strong> jogos</span>
      <span class="stat-v"><strong>${v}</strong> V</span>
      <span class="stat-e"><strong>${e}</strong> E</span>
      <span class="stat-d"><strong>${d}</strong> D</span>
      <span><strong>${gp}</strong> gols pró</span>
      <span><strong>${gc}</strong> gols sofridos</span>
    </div>`;
  }

  // Lista dos resultados
  if (resultadosFiltrados.length === 0) {
    html += '<div class="card empty">Nenhum jogo encontrado para esse time.</div>';
  } else {
    html += '<div class="resultados-lista">';
    for (const r of resultadosFiltrados) {
      const m = r.mandante || {};
      const v = r.visitante || {};
      const pm = r.placar_mandante;
      const pv = r.placar_visitante;

      // Determina classe de cor se filtrado por time
      let classeJogo = '';
      if (filtroTime) {
        const eMandante = m.nome === filtroTime;
        const meusGols = eMandante ? pm : pv;
        const golsAdv = eMandante ? pv : pm;
        if (meusGols > golsAdv) classeJogo = 'resultado-vitoria';
        else if (meusGols === golsAdv) classeJogo = 'resultado-empate';
        else classeJogo = 'resultado-derrota';
      }

      const escudoMandante = m.escudo
        ? `<img src="${m.escudo}" alt="${m.nome || ''}" loading="lazy">`
        : `<div class="escudo-fallback-pequeno">${(m.sigla || (m.nome || '?').slice(0,3)).toUpperCase()}</div>`;
      const escudoVisitante = v.escudo
        ? `<img src="${v.escudo}" alt="${v.nome || ''}" loading="lazy">`
        : `<div class="escudo-fallback-pequeno">${(v.sigla || (v.nome || '?').slice(0,3)).toUpperCase()}</div>`;

      const dataFmt = formatarDataResultado(r.data_iso);

      html += `<div class="resultado-card ${classeJogo}">
        <div class="resultado-meta">
          <span class="resultado-rodada">R${r.rodada}</span>
          <span class="resultado-data">${dataFmt}</span>
        </div>
        <div class="resultado-jogo">
          <div class="resultado-time mandante">
            <span class="resultado-nome">${m.nome || '?'}</span>
            <span class="resultado-escudo">${escudoMandante}</span>
          </div>
          <div class="resultado-placar">${pm} <span class="placar-x">×</span> ${pv}</div>
          <div class="resultado-time visitante">
            <span class="resultado-escudo">${escudoVisitante}</span>
            <span class="resultado-nome">${v.nome || '?'}</span>
          </div>
        </div>
        ${r.estadio ? `<div class="resultado-estadio">📍 ${r.estadio}</div>` : ''}
      </div>`;
    }
    html += '</div>';
  }

  if (meta.fonte) {
    html += `<div style="text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 16px;">Fonte: ${meta.fonte}</div>`;
  }

  container.innerHTML = html;
}

    times: [
      { time: TIMES_LISTA[1], palpite: 2 },
      { time: TIMES_LISTA[2], palpite: 3 },

  });

function editarParticipante(idx) {
  state.editIdx = idx;
  abrirEditor(JSON.parse(JSON.stringify(state.participantes[idx])));
}

function removerParticipante(idx) {
  const p = state.participantes[idx];
  if (!confirm(`Remover ${p.nome}?`)) return;
  state.participantes.splice(idx, 1);
  salvarParticipantes();
  render();
}

function abrirEditor(p) {
  const opcoesTime = TIMES_LISTA.map(t => `<option value="${t}">${t}</option>`).join('');
  const opcoesPos = Array.from({length:20}, (_,i) => `<option value="${i+1}">${i+1}º</option>`).join('');
  const opcoesDia = ['<option value="">--</option>']
    .concat(Array.from({length:31}, (_,i) => `<option value="${i+1}">${i+1}</option>`))
    .join('');
  const mesesNome = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const opcoesMes = ['<option value="">--</option>']
    .concat(mesesNome.map((nome, i) => `<option value="${i+1}">${nome}</option>`))
    .join('');

  let html = `<div class="modal-backdrop" onclick="if(event.target===this)fecharEditor()">
    <div class="modal">
      <h2>${state.editIdx === -1 ? 'Novo participante' : 'Editar participante'}</h2>
      <div class="form-group">
        <label>Nome</label>
        <input id="ed-nome" type="text" value="${p.nome.replace(/"/g,'&quot;')}" placeholder="Nome do participante">
      </div>
      <div class="form-group">
        <label>🎂 Aniversário (opcional)</label>
        <div class="form-row" style="grid-template-columns: 100px 1fr;">
          <select id="ed-aniv-dia">${opcoesDia}</select>
          <select id="ed-aniv-mes">${opcoesMes}</select>
        </div>
      </div>
      <div class="form-group">
        <label>❤️ Time Coração (acertar exato = +12 pts)</label>
        <div class="form-row">
          <select id="ed-cor-time">${opcoesTime}</select>
          <select id="ed-cor-palp">${opcoesPos}</select>
        </div>
      </div>`;
  for (let k = 0; k < 5; k++) {
    html += `<div class="form-group">
      <label>Time ${k+1} (acertar exato = +9 pts)</label>
      <div class="form-row">
        <select id="ed-t${k}-time">${opcoesTime}</select>
        <select id="ed-t${k}-palp">${opcoesPos}</select>
      </div>
    </div>`;
  }
  html += `<div class="form-group">
        <label>⬇️ Time que vai cair (cair entre 17º e 20º = +6 pts)</label>
        <select id="ed-cai">${opcoesTime}</select>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="fecharEditor()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarEditor()">Salvar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
  document.getElementById('ed-cor-time').value = p.coracao.time;
  document.getElementById('ed-cor-palp').value = p.coracao.palpite;
  document.getElementById('ed-aniv-dia').value = (p.aniversario && p.aniversario.dia) || '';
  document.getElementById('ed-aniv-mes').value = (p.aniversario && p.aniversario.mes) || '';
  for (let k = 0; k < 5; k++) {
    document.getElementById(`ed-t${k}-time`).value = p.times[k].time;
    document.getElementById(`ed-t${k}-palp`).value = p.times[k].palpite;
  }
  document.getElementById('ed-cai').value = p.cai;
}

function salvarEditor() {
  const aniDia = parseInt(document.getElementById('ed-aniv-dia').value) || null;
  const aniMes = parseInt(document.getElementById('ed-aniv-mes').value) || null;
  const aniversario = (aniDia && aniMes) ? { dia: aniDia, mes: aniMes } : null;

  const p = {
    nome: document.getElementById('ed-nome').value.trim() || 'Sem nome',
    coracao: {
      time: document.getElementById('ed-cor-time').value,
      palpite: parseInt(document.getElementById('ed-cor-palp').value)
    },
    times: [],
    cai: document.getElementById('ed-cai').value,
    aniversario: aniversario
  };
  for (let k = 0; k < 5; k++) {
    p.times.push({
      time: document.getElementById(`ed-t${k}-time`).value,
      palpite: parseInt(document.getElementById(`ed-t${k}-palp`).value)
    });
  }
  if (state.editIdx === -1) state.participantes.push(p);
  else state.participantes[state.editIdx] = p;
  salvarParticipantes();
  state.editIdx = null;
  document.getElementById('modal-container').innerHTML = '';
  render();
}

function fecharEditor() {
  state.editIdx = null;
  document.getElementById('modal-container').innerHTML = '';
}

async function carregarMembrosDoServidor() {
  // Tenta baixar membros.json do servidor.
  // Se sucesso e for diferente do localStorage, atualiza.
  try {
    const resp = await fetch('membros.json?t=' + Date.now());
    if (!resp.ok) return;
    const data = await resp.json();
    const membros = Array.isArray(data.membros) ? data.membros : null;
    if (!membros || membros.length === 0) return;
    // Substitui se for diferente
    if (JSON.stringify(membros) !== JSON.stringify(state.membros)) {
      state.membros = membros;
      salvarMembros();
      // Re-renderiza banner e pop-up se aplicável
      try {
        mostrarPopupAniversario();
      } catch (e) {}
    }
  } catch (e) {
    // Sem problema, segue com a lista do localStorage / padrão
  }
}

async function carregarMembrosTupalDoServidor() {
  // Tenta baixar membros_tupal.json do servidor.
  try {
    const resp = await fetch('membros_tupal.json?t=' + Date.now());
    if (!resp.ok) return;
    const data = await resp.json();
    const membros = Array.isArray(data.membros) ? data.membros : null;
    if (!membros || membros.length === 0) return;
    if (JSON.stringify(membros) !== JSON.stringify(state.membrosTupal)) {
      state.membrosTupal = membros;
      salvarMembrosTupal();
      if (state.view === 'tupal') render();
    }
  } catch (e) {}
}

function aniversariantesDeHoje() {
  // Usa fuso de Brasília pra pegar o dia correto
  const fmt = new Intl.DateTimeFormat('pt-BR', {
    timeZone: 'America/Sao_Paulo',
    day: '2-digit', month: '2-digit'
  });
  const partes = fmt.formatToParts(new Date());
  const obj = {};
  for (const p of partes) if (p.type !== 'literal') obj[p.type] = p.value;
  const diaHoje = parseInt(obj.day);
  const mesHoje = parseInt(obj.month);

  return state.membros.filter(p =>
    p.aniversario && p.aniversario.dia === diaHoje && p.aniversario.mes === mesHoje
  );
}

}

function mostrarPopupAniversario() {
  const aniversariantes = aniversariantesDeHoje();
  if (aniversariantes.length === 0) return;

  // Verifica se já mostrou o pop-up hoje (pra não saturar quem fica abrindo o site)
  const fmt = new Intl.DateTimeFormat('pt-BR', {
    timeZone: 'America/Sao_Paulo', day:'2-digit', month:'2-digit', year:'numeric'
  });
  const partes = fmt.formatToParts(new Date());
  const obj = {};
  for (const p of partes) if (p.type !== 'literal') obj[p.type] = p.value;
  const hojeChave = `${obj.year}-${obj.month}-${obj.day}`;
  const jaMostrado = localStorage.getItem('popup_aniv_data');
  if (jaMostrado === hojeChave) {
    // Já mostrou hoje; só renderiza o banner discreto
    renderBannerAniversario(aniversariantes);
    return;
  }

  // Monta o conteúdo do modal
  let conteudo = '<div style="text-align: center; padding: 8px 4px;">';
  conteudo += '<div style="font-size: 48px; margin-bottom: 8px;">🎂</div>';
  conteudo += '<h2 style="font-size: 22px; font-weight: 700; margin-bottom: 12px;">Hoje é aniversário!</h2>';

  for (const p of aniversariantes) {
    conteudo += `<div style="background: rgba(244,114,182,0.12); border: 1px solid rgba(244,114,182,0.4); border-radius: 10px; padding: 14px; margin-bottom: 10px;">`;
    conteudo += `<div style="font-size: 20px; font-weight: 600; color: #f472b6; margin-bottom: 8px;">${p.nome}</div>`;
    conteudo += `<a href="${linkWhatsAppParabens(p.nome)}" target="_blank" rel="noopener" class="btn btn-primary" style="display: inline-block; padding: 8px 16px; text-decoration: none; font-size: 14px;">📱 Mandar parabéns no WhatsApp</a>`;
    conteudo += `</div>`;
  }
  conteudo += '<button class="btn" onclick="fecharPopupAniversario()" style="margin-top: 8px; padding: 8px 20px;">Fechar</button>';
  conteudo += '</div>';

  const html = `<div class="modal-backdrop" onclick="if(event.target===this)fecharPopupAniversario()">
    <div class="modal" style="max-width: 460px;">${conteudo}</div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;

  // Marca como mostrado hoje
  localStorage.setItem('popup_aniv_data', hojeChave);

  // Também renderiza o banner permanente
  renderBannerAniversario(aniversariantes);
}

function fecharPopupAniversario() {
  document.getElementById('modal-container').innerHTML = '';
}

function renderBannerAniversario(aniversariantes) {
  // Renderiza banner permanente no topo do site (acima da status-bar)
  const containerExistente = document.getElementById('banner-aniversario');
  if (containerExistente) containerExistente.remove();

  if (!aniversariantes || aniversariantes.length === 0) return;

  const div = document.createElement('div');
  div.id = 'banner-aniversario';
  div.className = 'banner-aniversario';

  let html = '<span class="banner-icone">🎂</span>';
  if (aniversariantes.length === 1) {
    const p = aniversariantes[0];
    html += `<span>Hoje é aniversário de <strong>${p.nome}</strong></span>`;
    html += `<a href="${linkWhatsAppParabens(p.nome)}" target="_blank" rel="noopener" class="banner-link">Parabenizar 📱</a>`;
  } else {
    const nomes = aniversariantes.map(p => p.nome).join(', ');
    html += `<span>Hoje fazem aniversário: <strong>${nomes}</strong></span>`;

function abrirPopupAniversarioForcado() {
  // Força a abertura do pop-up mesmo já tendo sido fechado hoje

function renderAniversariantes() {
  const container = document.getElementById('view-aniversariantes');

  // Mês atual em Brasília
  const fmt = new Intl.DateTimeFormat('pt-BR', {
    timeZone: 'America/Sao_Paulo', day:'2-digit', month:'2-digit'
  });
  const partes = fmt.formatToParts(new Date());
  const obj = {};
  for (const p of partes) if (p.type !== 'literal') obj[p.type] = p.value;
  const diaHoje = parseInt(obj.day);
  const mesAtual = parseInt(obj.month);

  const mesesNome = ['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];

  // Agrupa membros por mês (só os que têm aniversário cadastrado)
  const porMes = {};
  const semData = [];
  for (const m of state.membros) {
    if (m.aniversario && m.aniversario.dia && m.aniversario.mes) {
      const mes = m.aniversario.mes;
      if (!porMes[mes]) porMes[mes] = [];
      porMes[mes].push(m);
    } else {
      semData.push(m);
    }
  }

  // Ordena por dia dentro de cada mês
  for (const mes in porMes) {
    porMes[mes].sort((a,b) => a.aniversario.dia - b.aniversario.dia);
  }

  // Ordem dos meses começando pelo mês atual
  const ordemMeses = [];
  for (let i = 0; i < 12; i++) {
    const mes = ((mesAtual - 1 + i) % 12) + 1;
    ordemMeses.push(mes);
  }

  // Header
  let html = '<div class="secao-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">';
  html += `<h2 style="font-size: 14px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin: 0;">Aniversariantes · ${state.membros.length} membros</h2>`;
  html += '</div>';

  // Aniversariantes de hoje (destaque)
  const hoje = state.membros.filter(m =>
    m.aniversario && m.aniversario.dia === diaHoje && m.aniversario.mes === mesAtual
  );
  if (hoje.length > 0) {
    html += '<div class="aniv-hoje">';
    html += '<div class="aniv-hoje-titulo">🎂 HOJE</div>';
    for (const m of hoje) {
      html += `<div class="aniv-hoje-card">`;
      html += `<span class="aniv-hoje-nome">${m.nome}</span>`;
      html += `<a href="${linkWhatsAppParabens(m.nome)}" target="_blank" rel="noopener" class="aniv-link-zap">📱 Parabenizar</a>`;
      html += `</div>`;
    }
    html += '</div>';
  }

  // Lista por mês
  for (const mes of ordemMeses) {
    const lista = porMes[mes] || [];
    if (lista.length === 0) continue;
    const ehMesAtual = mes === mesAtual;
    html += `<div class="aniv-mes ${ehMesAtual ? 'aniv-mes-atual' : ''}">`;
    html += `<div class="aniv-mes-header">${mesesNome[mes-1]}${ehMesAtual ? ' · Mês atual' : ''}</div>`;
    html += '<div class="aniv-mes-lista">';
    for (const m of lista) {
      const ehHoje = ehMesAtual && m.aniversario.dia === diaHoje;
      const dia = String(m.aniversario.dia).padStart(2, '0');
      const mesFmt = String(m.aniversario.mes).padStart(2, '0');
      html += `<div class="aniv-item ${ehHoje ? 'aniv-item-hoje' : ''}">`;
      html += `<span class="aniv-data">${dia}/${mesFmt}</span>`;
      html += `<span class="aniv-nome">${m.nome}</span>`;
      html += `<a href="${linkWhatsAppParabens(m.nome)}" target="_blank" rel="noopener" class="aniv-link-zap-pequeno" title="Parabenizar no WhatsApp">📱</a>`;
      html += `</div>`;
    }
    html += '</div></div>';
  }

  // Sem data cadastrada
  if (semData.length > 0) {
    html += `<div class="aniv-mes aniv-mes-sem-data">`;
    html += `<div class="aniv-mes-header">SEM DATA CADASTRADA · ${semData.length} membro(s)</div>`;
    html += '<div class="aniv-mes-lista">';
    for (const m of semData) {
      html += `<div class="aniv-item aniv-item-sem-data">`;
      html += `<span class="aniv-data">—</span>`;
      html += `<span class="aniv-nome">${m.nome}</span>`;
      html += `</div>`;
    }
    html += '</div></div>';
  }

  if (state.membros.length === 0) {
    html += '<div class="card empty">Nenhum membro cadastrado ainda. Use a aba Admin pra adicionar.</div>';
  }

  container.innerHTML = html;
}

function novoMembro() {
  state.editMembroIdx = -1;
  abrirEditorMembro({nome: "", aniversario: null});
}

function editarMembro(idx) {
  state.editMembroIdx = idx;
  abrirEditorMembro(state.membros[idx]);
}

function removerMembro(idx) {
  const m = state.membros[idx];
  if (!confirm(`Remover ${m.nome} da lista de membros?`)) return;
  state.membros.splice(idx, 1);
  salvarMembros();
  render();
}

function abrirEditorMembro(m) {
  const opcoesDia = ['<option value="">--</option>']
    .concat(Array.from({length:31}, (_,i) => `<option value="${i+1}">${i+1}</option>`))
    .join('');
  const mesesNome = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const opcoesMes = ['<option value="">--</option>']
    .concat(mesesNome.map((nome, i) => `<option value="${i+1}">${nome}</option>`))
    .join('');

  const html = `<div class="modal-backdrop" onclick="if(event.target===this)fecharEditorMembro()">
    <div class="modal">
      <h2>${state.editMembroIdx === -1 ? 'Novo membro' : 'Editar membro'}</h2>
      <div class="form-group">
        <label>Nome</label>
        <input id="ed-membro-nome" type="text" value="${m.nome.replace(/"/g,'&quot;')}" placeholder="Nome do membro">
      </div>
      <div class="form-group">
        <label>🎂 Aniversário (opcional)</label>
        <div class="form-row" style="grid-template-columns: 100px 1fr;">
          <select id="ed-membro-dia">${opcoesDia}</select>
          <select id="ed-membro-mes">${opcoesMes}</select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="fecharEditorMembro()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarMembroEditor()">Salvar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
  document.getElementById('ed-membro-dia').value = (m.aniversario && m.aniversario.dia) || '';
  document.getElementById('ed-membro-mes').value = (m.aniversario && m.aniversario.mes) || '';
}

function salvarMembroEditor() {
  const nome = document.getElementById('ed-membro-nome').value.trim();
  if (!nome) {
    alert('Nome é obrigatório');
    return;
  }
  const dia = parseInt(document.getElementById('ed-membro-dia').value) || null;
  const mes = parseInt(document.getElementById('ed-membro-mes').value) || null;
  const aniversario = (dia && mes) ? { dia, mes } : null;
  const m = { nome, aniversario };

  if (state.editMembroIdx === -1) state.membros.push(m);
  else state.membros[state.editMembroIdx] = m;
  salvarMembros();
  state.editMembroIdx = null;
  document.getElementById('modal-container').innerHTML = '';
  render();
}

function fecharEditorMembro() {
  state.editMembroIdx = null;
  document.getElementById('modal-container').innerHTML = '';
}

function exportarMembrosJSON() {
  const data = {
    atualizado_em: new Date().toISOString(),
    total: state.membros.length,
    membros: state.membros
  };
  const json = JSON.stringify(data, null, 2);

  const html = `<div class="modal-backdrop" onclick="if(event.target===this)fecharExportar()">
    <div class="modal" style="max-width: 600px;">
      <h2>📤 Exportar membros para GitHub</h2>
      <p style="font-size: 13px; color: var(--text-secondary); margin: 8px 0 12px;">
        Copie o conteúdo abaixo e cole no arquivo <strong>membros.json</strong> do repositório no GitHub.
        Isso é necessário para que o robô do email saiba quem faz aniversário.
      </p>
      <textarea id="export-textarea" readonly style="width:100%; height:300px; font-family: monospace; font-size:11px; padding:10px; background: var(--card-solid); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: vertical;">${json.replace(/</g,'&lt;')}</textarea>
      <div class="modal-footer">
        <button class="btn" onclick="fecharExportar()">Fechar</button>
        <button class="btn btn-primary" onclick="copiarExportado()">📋 Copiar tudo</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function copiarExportado() {
  const ta = document.getElementById('export-textarea');
  ta.select();
  ta.setSelectionRange(0, 99999);
  try {
    navigator.clipboard.writeText(ta.value);
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  } catch (e) {
    document.execCommand('copy');
    alert('Texto copiado!');
  }
}

function fecharExportar() {
  document.getElementById('modal-container').innerHTML = '';
}

        <input id="ed-mt-nome" type="text" value="${m.nome.replace(/"/g,'&quot;')}" placeholder="Nome do membro">
      </div>
      <div class="form-group">
        <label>🎂 Aniversário (opcional)</label>
        <div class="form-row" style="grid-template-columns: 100px 1fr;">
          <select id="ed-mt-dia">${opcoesDia}</select>
          <select id="ed-mt-mes">${opcoesMes}</select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="fecharEditorMembroTupal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarMembroTupalEditor()">Salvar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
  document.getElementById('ed-mt-dia').value = (m.aniversario && m.aniversario.dia) || '';
  document.getElementById('ed-mt-mes').value = (m.aniversario && m.aniversario.mes) || '';
}

function salvarMembroTupalEditor() {
  const nome = document.getElementById('ed-mt-nome').value.trim();
  if (!nome) {
    alert('Nome é obrigatório');
    return;
  }
  const dia = parseInt(document.getElementById('ed-mt-dia').value) || null;
  const mes = parseInt(document.getElementById('ed-mt-mes').value) || null;
  const aniversario = (dia && mes) ? { dia, mes } : null;
  const m = { nome, aniversario };

  if (state.editMembroTupalIdx === -1) state.membrosTupal.push(m);
  else state.membrosTupal[state.editMembroTupalIdx] = m;
  salvarMembrosTupal();
  state.editMembroTupalIdx = null;
  document.getElementById('modal-container').innerHTML = '';
  render();
}

function fecharEditorMembroTupal() {
  state.editMembroTupalIdx = null;
  document.getElementById('modal-container').innerHTML = '';
}

function exportarMembrosTupalJSON() {
  const data = {
    atualizado_em: new Date().toISOString(),
    total: state.membrosTupal.length,
    membros: state.membrosTupal
  };
  const json = JSON.stringify(data, null, 2);

  const html = `<div class="modal-backdrop" onclick="if(event.target===this)fecharExportar()">
    <div class="modal" style="max-width: 600px;">
      <h2>📤 Exportar TUPAL para GitHub</h2>
      <p style="font-size: 13px; color: var(--text-secondary); margin: 8px 0 12px;">
        Copie e cole no arquivo <strong>membros_tupal.json</strong> do repositório no GitHub.
      </p>
      <textarea id="export-textarea" readonly style="width:100%; height:300px; font-family: monospace; font-size:11px; padding:10px; background: var(--card-solid); color: var(--text); border: 1px solid var(--border); border-radius: 8px; resize: vertical;">${json.replace(/</g,'&lt;')}</textarea>
      <div class="modal-footer">
        <button class="btn" onclick="fecharExportar()">Fechar</button>
        <button class="btn btn-primary" onclick="copiarExportado()">📋 Copiar tudo</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

// ========================================================================
// INICIALIZAÇÃO
// ========================================================================
inicializar();

// Verifica aniversariantes do dia após inicialização
setTimeout(() => {
  try {
    mostrarPopupAniversario();
  } catch (e) {
    console.error('Erro ao verificar aniversariantes:', e);
  }
}, 800);
</script>
</body>
</html>
