name: Atualizar resultados do Brasileirão

on:
  # Disparado pelo cron-job.org de hora em hora via API do GitHub.
  # O cron interno do GitHub Actions foi REMOVIDO porque, em repositorios
  # pequenos, ele atrasa muito ou pula execucoes (rodava ~1x/dia em vez
  # de 1x/hora). O cron-job.org dispara de forma pontual e confiavel.
  workflow_dispatch:

  push:
    paths:
      - 'atualizar_resultados.py'
      - '.github/workflows/atualizar-resultados.yml'

permissions:
  contents: write

# Grupo de concorrencia PROPRIO (separado dos outros workflows).
# Assim o disparo da tabela (a cada 15 min) NAO cancela este workflow.
# O conflito de git push e tratado pelo retry de 5 tentativas mais abaixo.
concurrency:
  group: bolao-resultados
  cancel-in-progress: false

jobs:
  atualizar:
    name: Buscar resultados e publicar resultados.json
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar resultados e gerar resultados.json
        run: python atualizar_resultados.py

      - name: Conferir se resultados.json foi gerado
        run: |
          if [ ! -f resultados.json ]; then
            echo "ERRO: resultados.json nao foi gerado pelo atualizar_resultados.py"
            exit 1
          fi
          echo "resultados.json gerado com sucesso."
          echo "Primeiras linhas:"
          head -n 20 resultados.json

      - name: Commitar resultados.json com retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add resultados.json

          if git diff --staged --quiet; then
            echo "Sem mudancas em resultados.json - nada a commitar."
            exit 0
          fi

          git commit -m "Atualizar resultados.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

          MAX_TENTATIVAS=5
          for tentativa in $(seq 1 $MAX_TENTATIVAS); do
            echo "Tentativa $tentativa/$MAX_TENTATIVAS de push..."
            if git push; then
              echo "Push bem-sucedido na tentativa $tentativa."
              exit 0
            fi
            echo "Push falhou. Fazendo pull --rebase e tentando de novo..."
            git pull --rebase --autostash || true
            sleep 3
          done

          echo "ERRO: Push falhou apos $MAX_TENTATIVAS tentativas."
          exit 1
