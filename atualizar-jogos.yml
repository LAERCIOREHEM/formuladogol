name: Atualizar próximos jogos

on:
  # Disparado pelo cron-job.org de hora em hora via API do GitHub.
  # O cron interno do GitHub Actions foi REMOVIDO porque, em repositorios
  # pequenos, ele atrasa muito ou pula execucoes. O cron-job.org dispara
  # de forma pontual e confiavel.
  workflow_dispatch:

  push:
    paths:
      - 'atualizar_jogos.py'
      - '.github/workflows/atualizar-jogos.yml'

permissions:
  contents: write

# Grupo de concorrencia PROPRIO (separado dos outros workflows).
# Assim o disparo da tabela/resultados NAO cancela este workflow.
# O conflito de git push e tratado pelo retry de 5 tentativas mais abaixo.
concurrency:
  group: bolao-jogos
  cancel-in-progress: false

jobs:
  atualizar:
    name: Buscar próximos jogos e publicar jogos.json
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v5
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar jogos e gerar jogos.json
        run: python atualizar_jogos.py

      - name: Conferir se jogos.json foi gerado
        run: |
          if [ ! -f jogos.json ]; then
            echo "ERRO: jogos.json nao foi gerado pelo atualizar_jogos.py"
            exit 1
          fi
          echo "jogos.json gerado com sucesso."
          echo "Primeiras linhas:"
          head -n 20 jogos.json

      - name: Commitar jogos.json com retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jogos.json

          if git diff --staged --quiet; then
            echo "Sem mudancas em jogos.json - nada a commitar."
            exit 0
          fi

          git commit -m "Atualizar jogos.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

          MAX_TENTATIVAS=5
          for tentativa in $(seq 1 $MAX_TENTATIVAS); do
            echo "Tentativa $tentativa/$MAX_TENTATIVAS de push..."
            if git push; then
              echo "Push bem-sucedido na tentativa $tentativa."
              exit 0
            fi
            echo "Push falhou. Fazendo pull --rebase e tentando de novo..."
            git pull --rebase --autostash || true
            sleep 3
          done

          echo "ERRO: Push falhou apos $MAX_TENTATIVAS tentativas."
          exit 1
