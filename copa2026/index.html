<style>
  .wrap{max-width:580px;margin:0 auto;padding:16px 12px 60px}
  .cab-topo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .cab-topo .tro{font-size:26px}
  .cab-topo h1{font-family:'Anton',sans-serif;font-weight:400;font-size:19px;letter-spacing:.5px;line-height:1}
  .cab-topo h1 b{color:var(--gold)}
  .cab-topo .sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cinza);margin-top:3px}
  .voltar{display:inline-block;color:var(--cinza);font-size:13px;text-decoration:none;border-bottom:1px dotted var(--cinza);margin-bottom:14px}

  .navdia{display:flex;align-items:center;gap:10px;background:var(--navy-2);border:1px solid var(--linha);border-radius:12px;padding:10px;margin-bottom:14px}
  .navdia button{font-family:inherit;font-weight:700;font-size:18px;width:42px;height:42px;border-radius:9px;cursor:pointer;border:1px solid var(--linha);background:var(--navy-3);color:var(--branco)}
  .navdia button:disabled{opacity:.35;cursor:not-allowed}
  .navdia .meio{flex:1;text-align:center}
  #dia-rotulo{font-family:'Anton',sans-serif;font-size:16px;letter-spacing:.5px;text-transform:capitalize}

  .jogo{display:block;background:var(--navy-2);border:1px solid var(--linha);border-radius:12px;padding:11px 13px;margin-bottom:8px}
  .jogo .topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0;border-bottom:none}
  .jogo .fase{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cinza)}
  .badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:99px}
  .badge.ag{color:var(--cinza);border:1px solid var(--linha)}
  .badge.fim{color:var(--gold);border:1px solid var(--gold-2)}
  .badge.live{color:#ff8a82;background:rgba(224,71,62,.15);border:1px solid rgba(224,71,62,.4);display:inline-flex;align-items:center;gap:6px}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--vermelho);animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,71,62,.6)}70%{box-shadow:0 0 0 8px rgba(224,71,62,0)}100%{box-shadow:0 0 0 0 rgba(224,71,62,0)}}

  .linha{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
  .lado{display:flex;align-items:center;gap:9px;min-width:0}
  .lado.f{justify-content:flex-end}
  .lado img{width:30px;border-radius:3px;box-shadow:0 0 0 1px rgba(255,255,255,.12)}
  .lado .t{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lado.venc .t{color:var(--gold)}
  .placar{display:flex;align-items:center;gap:9px;font-family:'Anton',sans-serif}
  .placar .g{font-size:26px;min-width:26px;text-align:center}
  .placar .x{color:var(--cinza);font-size:15px}
  .hora{font-family:'Anton',sans-serif;font-size:18px;color:var(--gold);letter-spacing:1px;white-space:nowrap}
  .venue{font-size:11px;color:var(--cinza);text-align:center;margin-top:8px}
  .vermais{background:none;border:none;color:var(--gold);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;padding:0}
  .subpal{margin-top:6px;border-top:1px dashed var(--linha);padding-top:4px}
  .subcnt{font-size:11px;color:var(--cinza);margin:4px 0}
  .subpal .prow{display:flex;justify-content:space-between;align-items:center;padding:6px 2px;font-size:13px;border-top:1px solid var(--linha)}
  .subpal .pal{color:var(--cinza);font-variant-numeric:tabular-nums;display:inline-flex;align-items:center;gap:2px}
  .bola{display:inline-block;width:11px;height:11px;border-radius:50%;margin-left:9px}
  .bola.v{background:var(--verde)}.bola.x{background:rgba(159,176,199,.25)}
  .cravou{color:var(--gold);font-weight:700;font-size:11px;margin-left:8px}
  .aguard{color:var(--cinza);font-size:11px;margin-left:8px}
  .vazio{color:var(--cinza);text-align:center;padding:24px;line-height:1.6}
  @media(max-width:480px){
    .linha{gap:6px}
    .lado{flex-direction:column;justify-content:flex-start;align-items:center;gap:5px;text-align:center}
    .lado.f{flex-direction:column;align-items:center}
    .lado img{width:34px}
    .lado .t{white-space:normal;font-size:12.5px;line-height:1.25;max-width:100%}
    .placar .g{font-size:22px;min-width:22px}
    .hora{font-size:15px}
    .jogo .fase{letter-spacing:1px}
  }
  .tvs{display:flex;flex-wrap:wrap;gap:4px;align-items:center;justify-content:center;margin-top:8px;font-size:11px;color:var(--cinza)}
  .tvchip{font-size:9.5px;font-weight:700;letter-spacing:.3px;padding:2px 7px;border-radius:99px;white-space:nowrap}
  .vistog{display:flex;gap:6px;margin-bottom:12px}
  .vbtn{flex:1;font-family:inherit;font-weight:700;font-size:14px;padding:10px;border-radius:10px;cursor:pointer;
    border:1px solid var(--linha);background:var(--navy-2);color:var(--cinza)}
  .vbtn.on{background:var(--gold);color:#3a2a00;border-color:var(--gold)}
  .leg-grp{font-size:11px;color:var(--cinza);line-height:1.5;margin:0 2px 12px}.leg-grp b{color:var(--gold)}
  .grpcard{background:var(--navy-2);border:1px solid var(--linha);border-radius:12px;padding:8px 6px 4px;margin-bottom:10px;overflow:hidden}
  .grpcab{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.5px;color:var(--gold);padding:2px 8px 8px}
  .tabgrp{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  .tabgrp th,.tabgrp td{width:26px;padding:7px 0;text-align:center;box-sizing:border-box}
  .tabgrp th{font-size:10px;font-weight:700;color:var(--cinza);text-transform:uppercase;letter-spacing:.2px;border-bottom:1px solid var(--linha)}
  .tabgrp td{border-bottom:1px solid rgba(255,255,255,.05)}
  .tabgrp th.cpos,.tabgrp td.cpos{width:22px}
  .tabgrp th.ctime,.tabgrp td.ctime{width:auto}
  .tabgrp tr:last-child td{border-bottom:none}
  .tabgrp .ctime{text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:2px}
  .tabgrp .ctime img{width:20px;border-radius:2px;vertical-align:-4px;margin-right:5px}
  .tabgrp .cpos{color:var(--cinza)}
  .tabgrp td b{color:var(--branco);font-family:'Anton',sans-serif;font-size:14px}
  .tabgrp tr.classif{background:rgba(244,197,66,.07)}
  .tabgrp tr.classif .cpos{color:var(--gold);font-weight:700}
  @media(max-width:430px){.tabgrp{font-size:12px}.tabgrp th,.tabgrp td{width:22px;padding:7px 0}.tabgrp th.cpos,.tabgrp td.cpos{width:18px}.tabgrp th{font-size:9px}.tabgrp .ctime{font-size:11.5px}.tabgrp .ctime img{width:17px;margin-right:4px}.tabgrp td b{font-size:13px}}
  @media(max-width:360px){.tabgrp th,.tabgrp td{width:19px}.tabgrp .ctime img{display:none}}
  .hdr{margin:0 0 14px}
  .hdr-svg{display:block;width:100%;height:auto;max-width:520px}
</style>
