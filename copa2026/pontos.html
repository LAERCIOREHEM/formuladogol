<style>
  .wrap{max-width:580px;margin:0 auto;padding:16px 12px 60px}
  .cab-topo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .cab-topo .tro{font-size:26px}
  .cab-topo h1{font-family:'Anton',sans-serif;font-weight:400;font-size:19px;letter-spacing:.5px;line-height:1}
  .cab-topo h1 b{color:var(--gold)}
  .cab-topo .sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cinza);margin-top:3px}
  .voltar{display:inline-block;color:var(--cinza);font-size:13px;text-decoration:none;border-bottom:1px dotted var(--cinza);margin-bottom:12px}
  .premio{font-size:12px;color:var(--cinza);margin:0 2px 10px}.premio b{color:var(--gold)}
  .legenda-top{display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--cinza);margin-bottom:12px}
  .legenda-top span{display:inline-flex;align-items:center;gap:5px}
  .sq{width:11px;height:11px;border-radius:3px;display:inline-block}.sq.v{background:var(--verde)}.sq.r{background:var(--vermelho)}.sq.g{background:rgba(159,176,199,.3)}
  .aviso{background:rgba(244,197,66,.10);border:1px solid var(--gold-2);border-radius:12px;padding:11px 13px;margin-bottom:14px;font-size:13px;line-height:1.55;color:#f3dea6}.aviso b{color:var(--gold)}

  .card{background:var(--navy-2);border:1px solid var(--linha);border-radius:12px;padding:12px 13px;margin-bottom:8px}
  .card.p1{border-color:rgba(244,197,66,.55);background:linear-gradient(90deg,rgba(244,197,66,.10),var(--navy-2))}
  .card.p2{border-color:rgba(199,208,220,.4)}.card.p3{border-color:rgba(205,127,77,.45)}
  .head{display:flex;align-items:center;gap:10px}
  .head .pos{font-family:'Anton',sans-serif;font-size:18px;width:28px;text-align:center;color:var(--cinza)}
  .head .medal{font-size:20px;width:28px;text-align:center}
  .head .nm{flex:1;font-weight:700;font-size:16px}
  .head .conq{font-family:'Anton',sans-serif;font-size:24px;letter-spacing:1px}
  .card.p1 .conq{color:var(--gold)}.card.p2 .conq{color:#c7d0dc}.card.p3 .conq{color:#cd7f4d}
  .head .conq small{display:block;font-family:'Archivo';font-size:9px;font-weight:600;color:var(--cinza);letter-spacing:1px;text-align:right}
  .barra{display:flex;height:9px;border-radius:99px;overflow:hidden;margin:10px 0 8px;background:rgba(0,0,0,.25)}
  .barra .b{height:100%}.barra .v{background:var(--verde)}.barra .r{background:var(--vermelho)}.barra .g{background:rgba(159,176,199,.3)}

  .nums b{font-family:'Anton',sans-serif;font-size:14px;letter-spacing:.5px}

  .nums span{color:var(--cinza)}
  .sel{margin-top:10px;border-top:1px solid var(--linha);padding-top:8px;font-size:12px;color:var(--cinza);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .fases{display:flex;flex-wrap:wrap;gap:4px 12px}.ph b{color:var(--branco);font-family:'Anton',sans-serif;font-size:13px}
  .det{display:none;margin-top:8px;font-size:12px;line-height:1.7}.det.aberto{display:block}
  .fp{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
  .fp img{width:18px;border-radius:2px;vertical-align:-3px}
  .fp .ok{color:var(--verde)}.fp .err{color:var(--vermelho)}.fp .pend{color:var(--cinza)}
  .pend{color:var(--cinza)}

  .bloq{max-width:420px;margin:50px auto 0;text-align:center;background:var(--navy-2);border:1px solid var(--linha);border-radius:14px;padding:28px 20px}
  .bloq .cad{font-size:40px;margin-bottom:10px}.bloq h2{font-family:'Anton',sans-serif;font-weight:400;font-size:20px;margin-bottom:8px}
  .bloq p{font-size:14px;color:var(--cinza);line-height:1.6}
  .vazio{color:var(--cinza);text-align:center;padding:24px}
  .tbnote{font-size:12px;color:var(--cinza);margin:0 2px 12px;text-align:center}.tbnote b{color:var(--gold)}
  .fases{border-top:1px solid var(--linha);margin-top:10px;padding-top:8px}
  .podiodet{margin-top:9px}
  .f32lab{font-size:11px;color:var(--cinza);margin-top:11px}.f32lab b{color:var(--gold)}
  .f32leg{font-size:10px;color:var(--cinza);margin:3px 0 5px;display:flex;gap:11px;flex-wrap:wrap;align-items:center}
  .f32leg i{display:inline-block;width:14px;height:10px;border-radius:2px;margin-right:3px;vertical-align:-1px}
  .f32leg .lg-a{outline:2px solid var(--gold)}.f32leg .lg-o{background:#3a4a63}.f32leg .lg-w{outline:2px solid var(--vermelho)}
  .f32{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
  .f32 span{display:inline-flex;border-radius:3px;padding:1px}
  .f32 span img{width:21px;border-radius:2px;display:block}
  .f32 span.alive{outline:2px solid var(--gold)}
  .f32 span.out img{opacity:.30;filter:grayscale(.7)}
  .f32 span.wrong{outline:2px solid var(--vermelho)}.f32 span.wrong img{opacity:.35;filter:grayscale(.7)}
  .ctrlbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px}
  .ctrlbar select{background:var(--navy-2);border:1px solid var(--linha);color:var(--branco);border-radius:9px;padding:8px 10px;font-family:inherit;font-size:13px;max-width:100%}
  .ordwrap{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
  .ordlab{font-size:11px;color:var(--cinza)}
  .ordbtn{background:var(--navy-2);border:1px solid var(--linha);color:var(--cinza);border-radius:99px;padding:5px 11px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .ordbtn.on{background:var(--gold);border-color:var(--gold);color:#3a2a00}
  .vistog{display:flex;gap:6px;margin-bottom:12px}
  .vbtn{flex:1;font-family:inherit;font-weight:700;font-size:14px;padding:11px;border-radius:10px;cursor:pointer;
    border:1px solid var(--linha);background:var(--navy-2);color:var(--cinza)}
  .vbtn.on{background:var(--gold);color:#3a2a00;border-color:var(--gold)}
  .aviso a{color:var(--gold)}
  .ext{margin-top:10px;border-top:1px dashed var(--linha);padding-top:8px}
  .extt{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
  .extrow{display:flex;justify-content:space-between;align-items:center;gap:6px 10px;padding:6px 0;
    border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;flex-wrap:wrap}
  .extrow:last-child{border-bottom:none}
  .extj i{font-style:normal;color:var(--cinza);font-size:10px;border:1px solid var(--linha);border-radius:5px;padding:1px 5px;margin-right:4px}
  .extj img{width:18px;border-radius:2px;vertical-align:-3px}
  .extp{color:var(--cinza);font-size:12px}
  .extpts{font-weight:700;color:var(--gold);font-size:12px;white-space:nowrap;margin-left:auto}
  @media(max-width:480px){.extj{flex:1 1 100%}.extrow{font-size:12.5px}}
  .vermais{background:none;border:none;color:var(--gold);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;padding:0}
  .extbox{margin-top:6px;border-top:1px dashed var(--linha);padding-top:6px}
  .extpts.s5{color:var(--gold)}.extpts.s3{color:#7ee2a3}.extpts.s2{color:var(--verde)}.extpts.s0{color:var(--cinza)}
