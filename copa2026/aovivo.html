<style>
  .wrap{max-width:560px;margin:0 auto;padding:16px 12px 60px}
  .cab-topo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .cab-topo .tro{font-size:26px}
  .cab-topo h1{font-family:'Anton',sans-serif;font-weight:400;font-size:19px;letter-spacing:.5px;line-height:1}
  .cab-topo h1 b{color:var(--gold)}
  .cab-topo .sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cinza);margin-top:3px}
  .voltar{display:inline-block;color:var(--cinza);font-size:13px;text-decoration:none;border-bottom:1px dotted var(--cinza);margin-bottom:14px}
  .demobar{background:repeating-linear-gradient(45deg,rgba(244,197,66,.10),rgba(244,197,66,.10) 10px,transparent 10px,transparent 20px);border:1px dashed var(--gold-2);color:var(--gold);font-size:12px;padding:9px 12px;border-radius:10px;margin-bottom:12px}

  .placar{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--navy-2),var(--navy));border:1px solid var(--linha);border-radius:16px;padding:16px 14px 14px;margin-bottom:12px;box-shadow:0 14px 34px rgba(0,0,0,.35)}
  .placar.pre{opacity:.96}
  .placar::before{content:"";position:absolute;inset:0;opacity:.07;pointer-events:none;background:radial-gradient(circle at 50% 44%, transparent 28px, rgba(255,255,255,.6) 29px, transparent 31px),linear-gradient(90deg,transparent 49.7%,rgba(255,255,255,.6) 50%,transparent 50.3%)}
  .topo{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;position:relative;padding:0;border-bottom:none}
  .fase{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cinza)}
  .aovivo{display:inline-flex;align-items:center;gap:6px;background:rgba(224,71,62,.15);color:#ff8a82;border:1px solid rgba(224,71,62,.4);padding:3px 10px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:1.5px}
  .aovivo.preb{background:rgba(244,197,66,.12);color:var(--gold);border-color:var(--gold-2)}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--vermelho);animation:pulse 1.4s infinite}
  .aovivo.preb .pulse{background:var(--gold)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,71,62,.6)}70%{box-shadow:0 0 0 8px rgba(224,71,62,0)}100%{box-shadow:0 0 0 0 rgba(224,71,62,0)}}
  .lp{position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .sel{display:flex;flex-direction:column;align-items:center;gap:7px}
  .sel img{width:56px;border-radius:5px;box-shadow:0 0 0 1px rgba(255,255,255,.15),0 5px 12px rgba(0,0,0,.4)}
  .sel .nm{font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.5px;text-align:center}
  .escore{display:flex;align-items:center;gap:9px}
  .escore .g{font-family:'Anton',sans-serif;font-size:46px;line-height:.9;min-width:42px;text-align:center;background:rgba(0,0,0,.25);border:1px solid var(--linha);border-radius:10px;padding:4px}
  .escore .x{color:var(--cinza)}
  .minuto{text-align:center;margin-top:10px;font-family:'Anton',sans-serif;font-size:14px;color:var(--gold);letter-spacing:1px}
  .contador{text-align:center;font-size:13px;color:var(--cinza);margin:14px 0 8px}
  .contador b{font-family:'Anton',sans-serif;font-size:18px;color:var(--verde);vertical-align:-1px}
  .lista{display:flex;flex-direction:column;gap:6px}
  .pp{display:flex;align-items:center;gap:9px;background:rgba(0,0,0,.18);border:1px solid var(--linha);border-radius:9px;padding:8px 11px}
  .pp .nm{flex:1;font-weight:600;font-size:14px}
  .pp .chip{font-family:'Anton',sans-serif;font-size:14px;letter-spacing:1px;background:rgba(0,0,0,.25);border:1px solid var(--linha);border-radius:7px;padding:2px 9px}
  .pp.errando{opacity:.55} .pp.vazio{opacity:.4}
  .dot{width:13px;height:13px;border-radius:50%;flex:0 0 auto}
  .dot.v{background:var(--verde);box-shadow:0 0 9px rgba(29,185,84,.6)}
  .dot.x{background:rgba(159,176,199,.22);border:1px solid var(--linha)}
  .dot.z{background:transparent;border:1px dashed var(--linha)}
  .badge-ex{font-size:10px;font-weight:700;color:#3a2a00;background:var(--gold);padding:3px 8px;border-radius:99px;animation:brilho 1.6s infinite}
  @keyframes brilho{0%,100%{box-shadow:0 0 8px rgba(244,197,66,.4)}50%{box-shadow:0 0 15px rgba(244,197,66,.7)}}
  .legenda{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:10px;font-size:11px;color:var(--cinza)}
  .legenda span{display:inline-flex;align-items:center;gap:5px}
  .obs-fase{margin-top:12px;font-size:12px;color:var(--cinza);text-align:center;line-height:1.5}

  .nada{max-width:420px;margin:40px auto 0;text-align:center;background:var(--navy-2);border:1px solid var(--linha);border-radius:14px;padding:30px 20px}
  .nada .bola{font-size:42px;margin-bottom:8px}
  .nada h2{font-family:'Anton',sans-serif;font-weight:400;font-size:20px;margin-bottom:8px}
  .nada p{font-size:14px;color:var(--cinza);line-height:1.6}
  .nada .prox{margin-top:10px} .nada .prox b{color:var(--branco)}
  .nada .link{display:inline-block;margin-top:16px;color:var(--gold);text-decoration:none;font-weight:600}
  .vazio{color:var(--cinza);text-align:center;padding:24px}
</style>
