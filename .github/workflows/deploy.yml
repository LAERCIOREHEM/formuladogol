name: Deploy site (GitHub Pages)

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'CNAME'
      - '*.json'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.webp'
      - '*.ico'
      - 'favicon*'
      - 'apple-touch-icon.png'
      - 'copa2026/**'
      - 'docs/**'
      - '.github/workflows/deploy.yml'

  # Publica imediatamente após workflows que atualizam dados do site.
  # Isso cobre commits feitos por GitHub Actions, que nem sempre disparam outro
  # workflow por "push" usando GITHUB_TOKEN.
  workflow_run:
    workflows:
      - 'Atualizar tudo (tabela, resultados e jogos)'
      - 'Buscar melhores momentos (CazéTV)'
      - 'Atualiza fair play (cartões)'
      - 'Atualizar próximos jogos'
      - 'Atualizar resultados do Brasileirão'
      - 'Atualizar tabela do Brasileirão'
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Montar site estatico limpo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          for item in \
            index.html CNAME robots.txt sitemap.xml \
            tabela.json resultados.json jogos.json membros.json \
            favicon.ico favicon-16.png favicon-32.png favicon-96.png favicon-192.png favicon-512.png \
            apple-touch-icon.png og-image.png; do
            if [[ -e "$item" ]]; then
              cp -a "$item" _site/
            fi
          done

          if [[ -d copa2026 ]]; then cp -a copa2026 _site/; fi
          if [[ -d docs ]]; then cp -a docs _site/; fi

          touch _site/.nojekyll

      - name: Validar pacote estatico antes do upload
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f _site/index.html ]]; then
            echo "ERRO: _site/index.html nao encontrado."
            exit 1
          fi

          if find _site -type l | grep -q .; then
            echo "ERRO: existem symlinks dentro de _site."
            find _site -type l
            exit 1
          fi

          echo "Total de arquivos:"
          find _site -type f | wc -l

          echo "Tamanho total:"
          du -sh _site

          echo "Maiores arquivos:"
          find _site -type f -printf '%s %p\n' > /tmp/site-files.txt
          sort -nr /tmp/site-files.txt > /tmp/site-files-sorted.txt
          head -20 /tmp/site-files-sorted.txt | awk '{printf "%.2f MB  %s\n", $1/1024/1024, $2}'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
