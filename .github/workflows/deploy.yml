name: Deploy site (GitHub Pages)

on:
  workflow_dispatch:

  # Publica quando houver push no main.
  # Observação importante:
  # Os workflows de dados já fazem commit/push no main. Portanto, o próprio push
  # já dispara o deploy. Não usamos workflow_run aqui para evitar deploy duplicado
  # e corrida na etapa "syncing_files" do GitHub Pages.
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'CNAME'
      - '*.json'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.webp'
      - '*.ico'
      - 'favicon*'
      - 'apple-touch-icon.png'
      - 'copa2026/**'
      - 'docs/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# Deploy do Pages precisa ser serializado.
# Não cancelar deploy em andamento: cancelamento no meio do "syncing_files"
# pode deixar uma publicação criada no GitHub Pages e a próxima batendo por cima.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Montar site estatico limpo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Arquivos da raiz usados pelo site
          for item in \
            index.html CNAME robots.txt sitemap.xml \
            tabela.json resultados.json jogos.json membros.json \
            favicon.ico favicon-16.png favicon-32.png favicon-96.png favicon-192.png favicon-512.png \
            apple-touch-icon.png og-image.png; do
            if [[ -e "$item" ]]; then
              cp -a "$item" _site/
            fi
          done

          # Pastas publicas
          if [[ -d copa2026 ]]; then cp -a copa2026 _site/; fi
          if [[ -d docs ]]; then cp -a docs _site/; fi

          # GitHub Pages nao deve processar Jekyll.
          touch _site/.nojekyll

          echo "Conteudo publicado em _site:"
          find _site -maxdepth 2 -type f | sort | head -200

      - name: Validar pacote estatico antes do upload
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f _site/index.html ]]; then
            echo "ERRO: _site/index.html nao encontrado."
            exit 1
          fi

          # GitHub Pages artifact nao deve conter symlinks/hardlinks.
          if find _site -type l | grep -q .; then
            echo "ERRO: existem symlinks dentro de _site."
            find _site -type l
            exit 1
          fi

          echo "Total de arquivos:"
          find _site -type f | wc -l

          echo "Tamanho total:"
          du -sh _site

          echo "Maiores arquivos:"
          # Com set -o pipefail, a combinação "sort | head" pode falhar com Broken pipe
          # porque o head fecha o pipe depois das primeiras linhas. Portanto, ordenamos
          # primeiro em arquivo temporário e só depois lemos o topo.
          find _site -type f -printf '%s %p\n' > /tmp/site-files.txt
          sort -nr /tmp/site-files.txt > /tmp/site-files-sorted.txt
          head -20 /tmp/site-files-sorted.txt | awk '{printf "%.2f MB  %s\n", $1/1024/1024, $2}'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
