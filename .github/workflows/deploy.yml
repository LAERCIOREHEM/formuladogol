name: Deploy site (GitHub Pages)

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - '*.html'
      - 'CNAME'
      - '*.json'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.webp'
      - '*.ico'
      - 'favicon*'
      - 'apple-touch-icon.png'
      - 'img/**'
      - 'css/**'
      - 'js/**'
      - 'dados-br/**'
      - 'copa2026/**'
      - 'docs/**'
      - '.github/workflows/deploy.yml'

  # Publica imediatamente após workflows que atualizam dados do site.
  # Isso cobre commits feitos por GitHub Actions, que nem sempre disparam outro
  # workflow por "push" usando GITHUB_TOKEN.
  workflow_run:
    workflows:
      - 'Atualizar Brasileirao (ESPN)'
      - 'Buscar transmissões ao vivo do Brasileirão'
      - 'Buscar melhores momentos GE TV'
      - 'Buscar melhores momentos YouTube POWER'
      - 'Atualizar tudo (agora somente Copa - ranking de desempenho)'
      - 'Buscar melhores momentos (CazéTV)'
      - 'Atualiza fair play (cartões)'
      - 'Apurar Apostas Brasileirão'
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Montar site estatico limpo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Arquivos de raiz que precisam ser publicados.
          # IMPORTANTE: apos o Brasileirão v2, as paginas apostas/estatisticas/clubes/museu/regras
          # tambem ficam na raiz. Antes o deploy copiava só index.html, causando 404 nessas paginas.
          for item in *.html CNAME robots.txt sitemap.xml \
            tabela.json resultados.json jogos.json membros.json \
            espn_eventos.json transmissoes.json \
            favicon.ico favicon-16.png favicon-32.png favicon-96.png favicon-192.png favicon-512.png \
            apple-touch-icon.png og-image.png; do
            if [[ -e "$item" ]]; then
              cp -a "$item" _site/
            fi
          done

          # Assets e dados usados pelas paginas novas do Brasileirão.
          for dir in img css js dados-br copa2026 docs; do
            if [[ -d "$dir" ]]; then
              cp -a "$dir" _site/
            fi
          done

          touch _site/.nojekyll

      - name: Validar pacote estatico antes do upload
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f _site/index.html ]]; then
            echo "ERRO: _site/index.html nao encontrado."
            exit 1
          fi

          # Trava especifica do Brasileirao v2: estas paginas e assets precisam
          # entrar no artefato publicado; se ficarem fora, o site abre a home,
          # mas /apostas.html, /estatisticas.html, /clubes.html e /museu.html dao 404.
          REQUIRED_BR=(
            "_site/apostas.html"
            "_site/aovivo.html"
            "_site/estatisticas.html"
            "_site/clubes.html"
            "_site/museu.html"
            "_site/regras.html"
            "_site/css/br-apostas.css"
            "_site/css/br-estatisticas.css"
            "_site/css/br-aovivo.css"
            "_site/css/br-institucional.css"
            "_site/js/br-apostas.js"
            "_site/js/br-aovivo.js"
            "_site/js/br-estatisticas.js"
            "_site/js/br-clubes.js"
            "_site/js/br-museu.js"
            "_site/dados-br/apostas-config.json"
            "_site/dados-br/ajustes-calendario.json"
            "_site/dados-br/calendario-completo.json"
            "_site/dados-br/auditoria-calendario.json"
            "_site/dados-br/clubes.json"
            "_site/dados-br/museu-brasileirao.json"
          )
          for f in "${REQUIRED_BR[@]}"; do
            if [[ ! -e "$f" ]]; then
              echo "ERRO: arquivo obrigatório do Brasileirão v2 fora do deploy: $f"
              exit 1
            fi
          done
          echo "OK: paginas e assets do Brasileirao v2 incluidos no pacote estatico."

          if find _site -type l | grep -q .; then
            echo "ERRO: existem symlinks dentro de _site."
            find _site -type l
            exit 1
          fi

          echo "Total de arquivos:"
          find _site -type f | wc -l

          echo "Tamanho total:"
          du -sh _site

          echo "Maiores arquivos:"
          find _site -type f -printf '%s %p\n' > /tmp/site-files.txt
          sort -nr /tmp/site-files.txt > /tmp/site-files-sorted.txt
          head -20 /tmp/site-files-sorted.txt | awk '{printf "%.2f MB  %s\n", $1/1024/1024, $2}'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
