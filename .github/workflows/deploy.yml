name: Deploy site (GitHub Pages)

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - '*.html'
      - 'CNAME'
      - '*.json'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.webp'
      - '*.ico'
      - 'favicon*'
      - 'apple-touch-icon.png'
      - 'img/**'
      - 'css/**'
      - 'js/**'
      - 'dados-br/**'
      - 'copa2026/**'
      - 'docs/**'
      - 'jogos/**'
      - 'tabela/**'
      - 'resultados/**'
      - 'bolao/**'
      - 'aniversariantes/**'
      - '.github/workflows/deploy.yml'

  # Publica imediatamente após workflows que atualizam dados do site.
  # Isso cobre commits feitos por GitHub Actions, que nem sempre disparam outro
  # workflow por "push" usando GITHUB_TOKEN.
  workflow_run:
    workflows:
      - 'Atualizar Brasileirao (ESPN)'
      - 'Buscar transmissões ao vivo do Brasileirão'
      - 'Buscar melhores momentos Brasileirão oficiais'
      - 'Atualizar Elencos Brasileirao (ESPN)'
      - 'Revisar melhores momentos Brasileirão oficiais'
      - 'Apurar Apostas Brasileirão'
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publicar GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Montar site estatico limpo
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Arquivos de raiz que precisam ser publicados.
          # IMPORTANTE: apos o Brasileirão v2, as paginas apostas/estatisticas/clubes/museu/regras
          # tambem ficam na raiz. Antes o deploy copiava só index.html, causando 404 nessas paginas.
          for item in *.html CNAME robots.txt sitemap.xml \
            tabela.json resultados.json jogos.json membros.json \
            espn_eventos.json transmissoes.json \
            favicon.ico favicon-16.png favicon-32.png favicon-96.png favicon-192.png favicon-512.png \
            apple-touch-icon.png og-image.png og-image-publico-v3.png og-image-whatsapp-v2.png og-image-aovivo-v2.jpg \
            favicon-formula-do-gol.ico \
            favicon-formula-do-gol-16.png favicon-formula-do-gol-32.png favicon-formula-do-gol-96.png \
            favicon-formula-do-gol-192.png favicon-formula-do-gol-512.png \
            apple-touch-icon-formula-do-gol.png og-image-formula-do-gol-v1.png; do
            if [[ -e "$item" ]]; then
              cp -a "$item" _site/
            fi
          done

          # Assets e dados usados pelas paginas novas do Brasileirão.
          # Rotas limpas são diretórios estáticos. Sem copiá-las para _site,
          # o GitHub Pages responde 404 mesmo que existam no repositório.
          for dir in img css js dados-br copa2026 docs jogos tabela resultados bolao aniversariantes; do
            if [[ -d "$dir" ]]; then
              cp -a "$dir" _site/
            fi
          done

          touch _site/.nojekyll

      - name: Validar pacote estatico antes do upload
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f _site/index.html ]]; then
            echo "ERRO: _site/index.html nao encontrado."
            exit 1
          fi

          # Trava especifica do Brasileirao v2: estas paginas e assets precisam
          # entrar no artefato publicado; se ficarem fora, o site abre a home,
          # mas /apostas.html, /estatisticas.html, /clubes.html e /museu.html dao 404.
          REQUIRED_BR=(
            "_site/apostas.html"
            "_site/aovivo.html"
            "_site/estatisticas.html"
            "_site/clubes.html"
            "_site/museu.html"
            "_site/regras.html"
            "_site/css/br-apostas.css"
            "_site/css/br-estatisticas.css"
            "_site/css/br-aovivo.css"
            "_site/css/br-institucional.css"
            "_site/js/br-apostas.js"
            "_site/js/br-aovivo.js"
            "_site/js/br-estatisticas.js"
            "_site/js/br-clubes.js"
            "_site/js/br-museu.js"
            "_site/dados-br/apostas-config.json"
            "_site/dados-br/ajustes-calendario.json"
            "_site/dados-br/calendario-completo.json"
            "_site/dados-br/auditoria-calendario.json"
            "_site/dados-br/clubes.json"
            "_site/dados-br/museu-brasileirao.json"
            "_site/jogos/index.html"
            "_site/tabela/index.html"
            "_site/resultados/index.html"
            "_site/bolao/index.html"
            "_site/aniversariantes/index.html"
            "_site/favicon-formula-do-gol.ico"
            "_site/favicon-formula-do-gol-16.png"
            "_site/favicon-formula-do-gol-32.png"
            "_site/favicon-formula-do-gol-96.png"
            "_site/favicon-formula-do-gol-192.png"
            "_site/favicon-formula-do-gol-512.png"
            "_site/apple-touch-icon-formula-do-gol.png"
            "_site/og-image-formula-do-gol-v1.png"
          )
          for f in "${REQUIRED_BR[@]}"; do
            if [[ ! -e "$f" ]]; then
              echo "ERRO: arquivo obrigatório do Brasileirão v2 fora do deploy: $f"
              exit 1
            fi
          done
          echo "OK: paginas, assets e rotas limpas do Brasileirao v2 incluidos no pacote estatico."

          python - <<'PY'
          from pathlib import Path

          rotas = {
              'jogos': 'jogos',
              'tabela': 'tabela',
              'resultados': 'resultados',
              'bolao': 'rank',
              'aniversariantes': 'aniversariantes',
          }
          for rota, view in rotas.items():
              arquivo = Path('_site') / rota / 'index.html'
              texto = arquivo.read_text(encoding='utf-8')
              esperado = f'view={view}'
              assert esperado in texto, f'{arquivo}: redirecionamento divergente; esperado {esperado}'

          index = Path('_site/index.html').read_text(encoding='utf-8')
          menu = Path('_site/js/br-menu.js').read_text(encoding='utf-8')
          apostas = Path('_site/js/br-apostas.js').read_text(encoding='utf-8')
          cname = Path('_site/CNAME').read_text(encoding='utf-8').strip()
          assert cname == 'formuladogol.com.br', f'CNAME divergente: {cname!r}'
          assert "aniversariantes: '/aniversariantes'" in index, 'index sem rota limpa de aniversariantes'
          assert '"/aniversariantes": "aniversariantes"' in menu, 'menu sem leitura da rota de aniversariantes'
          assert 'aniversariantes: "/aniversariantes"' in menu, 'menu sem URL limpa de aniversariantes'
          assert 'path === "/bolao" || path === "/aniversariantes"' in apostas, 'login sem retorno seguro para as rotas privadas limpas'

          paginas_menu = ['aovivo.html', 'apostas.html', 'clubes.html', 'estatisticas.html', 'museu.html', 'regras.html']
          paginas_formula = ['index.html', *paginas_menu]
          legado = '?brasileirao=1&view='
          for pagina in paginas_menu:
              texto = (Path('_site') / pagina).read_text(encoding='utf-8')
              assert legado not in texto, f'{pagina}: menu ainda contém URL legada'
              for rota in ('/jogos', '/tabela', '/resultados', '/bolao', '/aniversariantes'):
                  assert f'href="{rota}"' in texto, f'{pagina}: link limpo ausente para {rota}'

          referencias_formula = (
              'favicon-formula-do-gol-16.png',
              'favicon-formula-do-gol-32.png',
              'favicon-formula-do-gol-96.png',
              'favicon-formula-do-gol-192.png',
              'favicon-formula-do-gol-512.png',
              'apple-touch-icon-formula-do-gol.png',
              'favicon-formula-do-gol.ico',
              'og-image-formula-do-gol-v1.png',
          )
          for pagina in paginas_formula:
              texto = (Path('_site') / pagina).read_text(encoding='utf-8')
              for referencia in referencias_formula:
                  assert referencia in texto, f'{pagina}: referência ausente para {referencia}'

          print('OK: domínio, identidade Fórmula do Gol, rotas limpas, proteção privada, retorno pós-login e menus conferidos.')
          PY

          if find _site -type l | grep -q .; then
            echo "ERRO: existem symlinks dentro de _site."
            find _site -type l
            exit 1
          fi

          echo "Total de arquivos:"
          find _site -type f | wc -l

          echo "Tamanho total:"
          du -sh _site

          echo "Maiores arquivos:"
          find _site -type f -printf '%s %p\n' > /tmp/site-files.txt
          sort -nr /tmp/site-files.txt > /tmp/site-files-sorted.txt
          head -20 /tmp/site-files-sorted.txt | awk '{printf "%.2f MB  %s\n", $1/1024/1024, $2}'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 15
