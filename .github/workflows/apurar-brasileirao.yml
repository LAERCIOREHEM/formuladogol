name: Apurar Apostas Brasileirão

on:
  workflow_dispatch:
  schedule:
    # Apuração leve: a cada 30 minutos. O placar/tabela continuam no workflow ESPN de 10 em 10 min.
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  apurar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apurar apostas por rodada
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BRASILEIRAO_TEMPORADA: '2026'
        run: python scripts/apurar_rodada.py

      - name: Commit apuração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dados-br/apuracao.json dados-br/ranking-apostas.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de apuração."
          else
            git commit -m "Atualiza apuração das apostas do Brasileirão"
            git push
          fi
