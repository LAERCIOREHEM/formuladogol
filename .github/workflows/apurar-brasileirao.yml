name: Apurar Apostas Brasileirão

on:
  workflow_dispatch:
  schedule:
    # A cada 30 minutos. O JSON público mantém sigilo até a rodada ser marcada como apurada/publicada.
    - cron: '*/30 * * * *'
  # Dispara imediatamente após o workflow principal atualizar tabela e resultados.
  # O cron acima permanece como rede de segurança caso o principal não rode
  # (janela silenciosa, falha transitória, etc.).
  workflow_run:
    workflows: ['Atualizar Brasileirao (ESPN)']
    types: [completed]

permissions:
  contents: write

jobs:
  apurar:
    runs-on: ubuntu-latest
    # Quando o disparo vem de workflow_run, só executa se o workflow principal
    # terminou com sucesso. Cron e dispatch manual sempre rodam.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apurar apostas com sigilo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BRASILEIRAO_TEMPORADA: '2026'
        run: python scripts/apurar_rodada.py

      - name: Commit apuração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dados-br/apuracao.json dados-br/ranking-apostas.json
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de apuração."
          else
            git commit -m "Apura apostas do Brasileirão com sigilo"
            git push
          fi
