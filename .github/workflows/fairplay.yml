name: Atualiza fair play (cartões)

on:
  # Copa encerrada: preservado apenas para eventual execução manual histórica.
  workflow_dispatch: {}

permissions:
  contents: write

# Grupo global de escrita: qualquer workflow que dá git push no main entra na mesma fila.
# Isso evita corrida de push e deployment quebrado por execuções simultâneas.
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  fairplay:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Guard de fim da Copa
        shell: bash
        run: |
          HOJE=$(TZ=America/Sao_Paulo date +%Y%m%d)
          if [[ "$HOJE" -gt "20260720" ]]; then
            echo "A Copa acabou (passou de 20/07/2026). Nada a fazer."
            exit 0
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mostrar horário da execução
        shell: bash
        run: |
          echo "Horário UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horário Brasília:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Calcula o fair play
        run: |
          cd "$GITHUB_WORKSPACE/copa2026"
          python buscar_fairplay.py

      - name: Validar fairplay.json
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          if [[ ! -f copa2026/dados/fairplay.json ]]; then
            echo "ERRO: copa2026/dados/fairplay.json não foi gerado."
            exit 1
          fi
          python -m json.tool copa2026/dados/fairplay.json > /dev/null
          echo "fairplay.json gerado e validado com sucesso."

      - name: Commit do fairplay.json com push robusto
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "copa2026/dados/fairplay.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Nada mudou — sem commit."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Após atualizar com origin/main, nada mudou — sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualiza fair play (cartões) — automático"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; recalculando sobre origin/main mais recente..."
            sleep 3
          done

          echo "Não consegui enviar após várias tentativas."
          exit 1
