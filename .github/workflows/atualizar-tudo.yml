name: Atualizar tudo (tabela, resultados e jogos)

on:
  # Disparado pelo cron-job.org a cada 5 minutos via API do GitHub.
  # Um unico workflow roda os 3 scripts EM SEQUENCIA e faz UM commit
  # com os 3 arquivos juntos. Assim tabela.json, resultados.json e
  # jogos.json sao sempre da MESMA "foto" — acaba o descasamento entre
  # as abas Ranking, Brasileirao, Resultados e Proximos Jogos.
  #
  # Este e o workflow de PRIORIDADE MAXIMA: mantem o site praticamente
  # em tempo real durante os jogos. Frequencia de 5 min preservada.
  workflow_dispatch:

  push:
    paths:
      - 'atualizar.py'
      - 'atualizar_resultados.py'
      - 'atualizar_jogos.py'
      - '.github/workflows/atualizar-tudo.yml'

permissions:
  contents: write

# GRUPO GLOBAL DE ESCRITA (repo-write-main).
# TODOS os workflows que dao git push no main compartilham este grupo,
# garantindo que apenas UMA escrita ocorra por vez -> zero corrida de push.
#
# cancel-in-progress: false
#   -> As execucoes NAO se cancelam: elas enfileiram e rodam em serie.
#   -> Como cada execucao dura ~30-60s, a fila drena rapido.
#   -> Acaba com o erro "No jobs were run" causado por cancelamento em cadeia.
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  atualizar:
    name: Buscar dados e publicar os 3 JSONs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      # --- 1. TABELA ---
      # Regra de seguranca: atualizacao atomica.
      # Se qualquer script falhar, NAO publica pacote parcial/inconsistente.
      - name: Atualizar tabela.json
        id: tabela
        run: python atualizar.py

      # --- 2. RESULTADOS ---
      - name: Atualizar resultados.json
        id: resultados
        run: python atualizar_resultados.py

      # --- 3. JOGOS ---
      - name: Atualizar jogos.json
        id: jogos
        run: python atualizar_jogos.py

      - name: Conferir e validar JSONs gerados
        run: |
          set -euo pipefail
          echo "Arquivos JSON presentes e validos:"
          for arq in tabela.json resultados.json jogos.json; do
            if [ ! -f "$arq" ]; then
              echo "ERRO: $arq nao foi gerado."
              exit 1
            fi
            python -m json.tool "$arq" > /dev/null
            echo "  OK   $arq"
          done

      # Estrategia de push ROBUSTA E PADRONIZADA (modelo melhores-momentos):
      # guarda os artefatos gerados -> fetch + reset --hard origin/main ->
      # reaplica os arquivos -> commit -> push. Nunca gera conflito artificial
      # de rebase em arquivos-artefato, mesmo sob concorrencia real.
      - name: Commitar os 3 JSONs juntos com push robusto
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "tabela.json"
            "resultados.json"
            "jogos.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Sem mudancas nos JSONs - nada a commitar."
            exit 0
          fi

          # Guarda a saida recem-gerada num diretorio temporario.
          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Apos atualizar com origin/main, nada mudou - sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualizar dados do site - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; recalculando sobre origin/main mais recente..."
            sleep 3
          done

          echo "ERRO: Push falhou apos 5 tentativas."
          exit 1

