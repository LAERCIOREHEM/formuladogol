name: Atualizar tudo (agora somente Copa - ranking de desempenho)

on:
  # Disparado pelo cron-job.org a cada 5 minutos via API do GitHub.
  #
  # HISTORICO (05/07/2026): este workflow atualizava tabela.json,
  # resultados.json e jogos.json do Brasileirao via Terra/Globo.
  # Essa responsabilidade migrou para o workflow NOVO
  # ".github/workflows/atualizar-brasileirao.yml" (fonte ESPN, cron 10 min).
  # Aqui ficou APENAS o Ranking de Desempenho da COPA, que precisa da
  # frequencia de 5 min do cron-job.org ate o fim da Copa (20/07/2026).
  #
  # APOS 20/07/2026: este workflow pode ser removido junto com o job
  # correspondente no cron-job.org.
  workflow_dispatch:

  push:
    paths:
      - 'copa2026/gerar_ranking_desempenho.py'
      - 'copa2026/dados/jogos-detalhes.json'
      - 'copa2026/dados/estatisticas.json'
      - '.github/workflows/atualizar-tudo.yml'

permissions:
  contents: write

# GRUPO GLOBAL DE ESCRITA (repo-write-main).
# TODOS os workflows que dao git push no main compartilham este grupo,
# garantindo que apenas UMA escrita ocorra por vez -> zero corrida de push.
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  atualizar:
    name: Gerar Ranking de Desempenho da Copa
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      # --- RANKING DE DESEMPENHO DA COPA ---
      # Leve: nao bate no navegador do usuario. Usa os JSONs ja consolidados.
      - name: Gerar Ranking de Desempenho
        id: ranking_desempenho
        run: python3 copa2026/gerar_ranking_desempenho.py

      - name: Conferir e validar JSON gerado
        run: |
          set -euo pipefail
          arq="copa2026/dados/ranking-desempenho.json"
          if [ ! -f "$arq" ]; then
            echo "ERRO: $arq nao foi gerado."
            exit 1
          fi
          python -m json.tool "$arq" > /dev/null
          echo "  OK   $arq"

      # Estrategia de push ROBUSTA E PADRONIZADA (modelo melhores-momentos).
      - name: Commitar o ranking com push robusto
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "copa2026/dados/ranking-desempenho.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Sem mudancas - nada a commitar."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Apos atualizar com origin/main, nada mudou - sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualizar ranking de desempenho da Copa - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; recalculando sobre origin/main mais recente..."
            sleep 3
          done

          echo "ERRO: Push falhou apos 5 tentativas."
          exit 1
