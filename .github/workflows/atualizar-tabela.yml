name: Atualizar tabela do Brasileirão

on:
  # Disparado pelo cron-job.org a cada 15 minutos via API.
  # Cron interno desativado para evitar disputa com o cron-job.org.
  workflow_dispatch:

  # Roda tambem quando o script ou workflow forem alterados
  push:
    paths:
      - 'atualizar.py'
      - '.github/workflows/atualizar-tabela.yml'

permissions:
  contents: write

# Concurrency GLOBAL do repositorio: apenas UMA execucao
# de QUALQUER workflow de atualizacao roda por vez.
# Isso evita conflitos de git push entre workflows diferentes.
#
# cancel-in-progress: true
#   -> Se um novo trigger chegar enquanto outro esta rodando,
#      o que esta rodando e cancelado e o novo comeca.
#   -> Evita o erro "No jobs were run" causado por filas longas.
#   -> O retry do git push (5 tentativas) cobre o caso raro de
#      cancelamento durante o push.
concurrency:
  group: bolao-brasileirao-write
  cancel-in-progress: true

jobs:
  atualizar:
    name: Buscar tabela e publicar tabela.json
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar tabela e gerar tabela.json
        run: python atualizar.py

      - name: Conferir se tabela.json foi gerado
        run: |
          if [ ! -f tabela.json ]; then
            echo "ERRO: tabela.json nao foi gerado pelo atualizar.py"
            exit 1
          fi
          echo "tabela.json gerado com sucesso."
          echo "Primeiras linhas:"
          head -n 20 tabela.json

      - name: Commitar tabela.json com retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tabela.json

          if git diff --staged --quiet; then
            echo "Sem mudancas em tabela.json - nada a commitar."
            exit 0
          fi

          git commit -m "Atualizar tabela.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

          # Tenta push ate 5 vezes com pull rebase entre tentativas.
          # Resolve corridas raras com outros workflows.
          MAX_TENTATIVAS=5
          for tentativa in $(seq 1 $MAX_TENTATIVAS); do
            echo "Tentativa $tentativa/$MAX_TENTATIVAS de push..."
            if git push; then
              echo "Push bem-sucedido na tentativa $tentativa."
              exit 0
            fi
            echo "Push falhou. Fazendo pull --rebase e tentando de novo..."
            git pull --rebase --autostash || true
            sleep 3
          done

          echo "ERRO: Push falhou apos $MAX_TENTATIVAS tentativas."
          exit 1
