name: Atualizar tabela do Brasileirão

on:
  # Disparado pelo cron-job.org via API (fallback). O grosso da atualizacao
  # ja e feito por atualizar-tudo.yml (a cada 5 min). Este workflow existe
  # como reforco pontual e para rodar quando o script/YAML for alterado.
  workflow_dispatch:

  # Roda tambem quando o script ou workflow forem alterados
  push:
    paths:
      - 'atualizar.py'
      - '.github/workflows/atualizar-tabela.yml'

permissions:
  contents: write

# GRUPO GLOBAL DE ESCRITA (repo-write-main) — unico para todos os workflows
# que dao git push no main. Serializa qualquer escrita -> zero corrida de push.
# cancel-in-progress: false -> as execucoes enfileiram em vez de se cancelar,
# eliminando o erro "No jobs were run".
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  atualizar:
    name: Buscar tabela e publicar tabela.json
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar tabela e gerar tabela.json
        run: python atualizar.py

      - name: Conferir se tabela.json foi gerado
        run: |
          if [ ! -f tabela.json ]; then
            echo "ERRO: tabela.json nao foi gerado pelo atualizar.py"
            exit 1
          fi
          python -m json.tool tabela.json > /dev/null
          echo "tabela.json gerado e validado com sucesso."
          echo "Primeiras linhas:"
          head -n 20 tabela.json

      # Estrategia de push ROBUSTA E PADRONIZADA (modelo melhores-momentos):
      # guarda o artefato -> fetch + reset --hard origin/main -> reaplica ->
      # commit -> push. Nunca gera conflito artificial de rebase.
      - name: Commitar tabela.json com push robusto
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "tabela.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Sem mudancas em tabela.json - nada a commitar."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Apos atualizar com origin/main, nada mudou - sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualizar tabela.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; recalculando sobre origin/main mais recente..."
            sleep 3
          done

          echo "ERRO: Push falhou apos 5 tentativas."
          exit 1
