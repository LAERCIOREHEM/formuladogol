name: Enviar email de aniversariantes

on:
  # Roda todo dia as 6:00 UTC = 03:00 BRT
  schedule:
    - cron: '0 6 * * *'

  # Permite rodar manualmente pra testar
  workflow_dispatch:

  # Roda tambem quando o script ou workflow forem alterados
  push:
    paths:
      - 'verificar_aniversarios.py'
      - '.github/workflows/enviar-aniversarios.yml'

permissions:
  contents: read

# Concurrency separada: workflow de envio nao precisa concorrer com escrita do repo
concurrency:
  group: enviar-aniversarios
  cancel-in-progress: false

jobs:
  enviar:
    name: Verificar aniversariantes e enviar email
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Verificar aniversariantes e enviar email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: python verificar_aniversarios.py
