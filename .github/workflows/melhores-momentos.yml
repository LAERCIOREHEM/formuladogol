name: Buscar melhores momentos (CazéTV)

on:
  # Disparado EXTERNAMENTE pelo cron-job.org (pontual, de 10 em 10 min na janela
  # dos jogos e 1x às 6h). NÃO usamos 'schedule' do GitHub aqui porque ele atrasa
  # muito em horário de pico. O cron-job.org chama a API de dispatch deste workflow.
  workflow_dispatch:

permissions:
  contents: write

# Evita que duas execuções rodem ao mesmo tempo e colidam no push.
concurrency:
  group: melhores-momentos
  cancel-in-progress: false

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Parar após a Copa (20/07/2026)
        run: |
          HOJE=$(TZ=America/Sao_Paulo date +%Y%m%d)
          if [[ "$HOJE" -gt "20260720" ]]; then
            echo "A Copa acabou (passou de 20/07/2026). Nada a fazer."
            exit 0
          fi

      - name: Baixar o repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Rodar o buscador de melhores momentos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CAZE_PLAYLIST_ID: ${{ secrets.CAZE_PLAYLIST_ID }}
        run: python3 copa2026/buscar_melhores_momentos.py

      - name: Commitar e enviar se houve mudança
        run: |
          cd "$GITHUB_WORKSPACE"
          if [[ -z "$(git status --porcelain copa2026/dados/melhores-momentos.json copa2026/dados/lives.json)" ]]; then
            echo "Nada mudou — sem commit."
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add copa2026/dados/melhores-momentos.json copa2026/dados/lives.json
          git commit -m "Atualiza melhores momentos e lives (automático)"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push OK na tentativa $i."
              exit 0
            fi
            echo "Push rejeitado (tentativa $i). Puxando novidades e tentando de novo..."
            git pull --rebase --autostash origin main || true
            sleep 3
          done
          echo "Não consegui enviar após várias tentativas."
          exit 1
