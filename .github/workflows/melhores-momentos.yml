name: Buscar melhores momentos (CazéTV)

on:
  # Disparado EXTERNAMENTE pelo cron-job.org (pontual, de 10 em 10 min na janela
  # dos jogos e 1x às 6h). NÃO usamos 'schedule' do GitHub aqui porque ele atrasa
  # muito em horário de pico. O cron-job.org chama a API de dispatch deste workflow.
  workflow_dispatch:
    inputs:
      forcar_execucao:
        description: "Forçar execução mesmo fora da janela de jogo?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

# Evita que duas execuções rodem ao mesmo tempo e colidam no push.
concurrency:
  group: melhores-momentos
  cancel-in-progress: false

jobs:
  buscar:
    runs-on: ubuntu-latest
    steps:
      - name: Parar após a Copa (20/07/2026)
        run: |
          HOJE=$(TZ=America/Sao_Paulo date +%Y%m%d)
          if [[ "$HOJE" -gt "20260720" ]]; then
            echo "A Copa acabou (passou de 20/07/2026). Nada a fazer."
            exit 0
          fi

      - name: Baixar o repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verificar janela de jogos da Copa
        env:
          FORCAR_EXECUCAO: ${{ github.event.inputs.forcar_execucao || 'false' }}
        run: python3 copa2026/deve_rodar_workflow_copa.py

      - name: Mostrar decisão do guard
        run: |
          echo "RUN_COPA=${RUN_COPA}"
          echo "Motivo: ${RUN_COPA_MOTIVO}"

      - name: Rodar o buscador de melhores momentos
        if: env.RUN_COPA == 'true'
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CAZE_PLAYLIST_ID: ${{ secrets.CAZE_PLAYLIST_ID }}
          CAZE_COMPLETOS_PLAYLIST_ID: PLsFWLnYCEXEVWs5wf60vfwUU4FaOEre3D
        run: python3 copa2026/buscar_melhores_momentos.py

      - name: Rodar estatísticas da Copa
        if: env.RUN_COPA == 'true'
        # Aproveita o mesmo workflow acionado externamente pelo cron-job.org.
        # Assim as estatísticas acompanham o ciclo de 10 min sem depender do
        # agendamento interno do GitHub Actions.
        run: python3 copa2026/buscar_estatisticas.py

      - name: Rodar estatísticas detalhadas dos jogos
        if: env.RUN_COPA == 'true'
        # Gera dados/jogos-detalhes.json para o botão recolhível
        # "📊 Estatísticas do jogo" em Jogos e Onde assistir.
        run: python3 copa2026/buscar_detalhes_jogos.py

      - name: Commitar e enviar se houve mudança
        if: env.RUN_COPA == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          FILES=(
            "copa2026/dados/melhores-momentos.json"
            "copa2026/dados/lives.json"
            "copa2026/dados/jogos-completos.json"
            "copa2026/dados/estatisticas.json"
            "copa2026/dados/jogos-detalhes.json"
            "copa2026/dados/workflow_copa_estado.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Nada mudou — sem commit."
            exit 0
          fi

          # Estes arquivos são artefatos automáticos. Se outro workflow ou commit
          # chegar antes do nosso push, NÃO fazemos rebase desses JSONs, porque isso
          # gera conflito artificial. Guardamos a saída recém-gerada, atualizamos
          # para o origin/main mais novo e reaplicamos os JSONs por cima.
          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -f "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -f "$TMP_DIR/$f" ]]; then
                mkdir -p "$(dirname "$f")"
                cp "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Após atualizar com origin/main, nada mudou — sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualiza melhores momentos, jogos completos, lives e estatísticas (automático)"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i. O remoto avançou de novo; vou recalcular em cima do origin/main mais recente."
            sleep 3
          done

          echo "Não consegui enviar após várias tentativas."
          exit 1
