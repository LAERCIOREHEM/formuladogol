name: Diagnóstico YouTube (lives)

on:
  workflow_dispatch: {}

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rodar diagnóstico
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 copa2026/diagnostico_youtube.py
