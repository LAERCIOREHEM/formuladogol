name: Atualizar próximos jogos

on:
  # Roda 2x ao dia: 09:23 e 21:23 horário UTC (06:23 e 18:23 Brasília).
  # Calendário do Brasileirão é estável; não precisa rodar com frequência alta.
  schedule:
    - cron: '23 9,21 * * *'

  # Permite rodar manualmente
  workflow_dispatch:

  # Roda também quando o script ou o workflow forem alterados
  push:
    paths:
      - 'atualizar_jogos.py'
      - '.github/workflows/atualizar-jogos.yml'

permissions:
  contents: write

concurrency:
  group: atualizar-jogos-brasileirao
  cancel-in-progress: true

jobs:
  atualizar:
    name: Buscar próximos jogos e publicar jogos.json
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horário da execução
        run: |
          echo "Horário UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horário Brasília:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar jogos e gerar jogos.json
        run: python atualizar_jogos.py

      - name: Conferir se jogos.json foi gerado
        run: |
          if [ ! -f jogos.json ]; then
            echo "ERRO: jogos.json não foi gerado pelo atualizar_jogos.py"
            exit 1
          fi

          echo "jogos.json gerado com sucesso."
          echo "Primeiras linhas:"
          head -n 30 jogos.json

      - name: Commitar jogos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jogos.json

          if git diff --staged --quiet; then
            echo "Sem mudanças em jogos.json — nada a commitar."
          else
            git commit -m "Atualizar jogos.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"
            git push
            echo "Commit realizado com sucesso."
          fi
