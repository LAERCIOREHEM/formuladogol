name: Atualizar Elencos Brasileirao (ESPN)

on:
  # Carga pesada de elencos/fotos: uma vez por madrugada.
  # 06:17 UTC = 03:17 BRT. Para a primeira carga completa, prefira rodar localmente
  # scripts/baixar_elencos_local.py e subir dados-br/elencos.json.
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  atualizar-elencos:
    name: Buscar elencos ESPN e publicar JSON
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Buscar elencos dos clubes (ESPN roster)
        run: python scripts/buscar_elencos_brasileirao.py

      - name: Validar elencos.json
        run: |
          set -euo pipefail
          python -m json.tool dados-br/elencos.json > /dev/null
          python - <<'PY'
          import json
          d = json.load(open('dados-br/elencos.json', encoding='utf-8'))
          assert isinstance(d.get('elencos'), dict), 'elencos.json sem objeto elencos'
          assert len(d.get('elencos') or {}) == 20, 'elencos.json sem 20 clubes'
          print('OK elencos:', d.get('total_clubes_com_elenco'), 'clubes,', d.get('total_jogadores'), 'jogadores')
          PY

      - name: Commitar elencos se mudou
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -z "$(git status --porcelain -- dados-br/elencos.json)" ]]; then
            echo "Sem mudanças em dados-br/elencos.json."
            exit 0
          fi
          git add dados-br/elencos.json
          git commit -m "Atualizar elencos Brasileirao (ESPN roster) - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"
          git pull --rebase origin main
          git push origin HEAD:main
