name: Substituir fontes dos melhores momentos (GE/Cazé/Prime)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Só simular (true) ou aplicar de verdade (false)?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      rodada_inicio:
        description: "Rodada inicial (vazio = todas)"
        required: false
        default: ""
      rodada_fim:
        description: "Rodada final (vazio = todas)"
        required: false
        default: ""
      paginas_caze:
        description: "Páginas de uploads da CazéTV a varrer (50 vídeos/página)"
        required: true
        default: "12"

permissions:
  contents: write

concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  substituir:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validar script (offline)
        run: |
          python -m py_compile scripts/substituir_fontes_preferidas_mm.py
          python scripts/substituir_fontes_preferidas_mm.py --selftest

      - name: Executar substituição de fontes
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          CMD=(python scripts/substituir_fontes_preferidas_mm.py --paginas-caze "${{ inputs.paginas_caze }}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD+=(--dry-run)
          fi
          if [ -n "${{ inputs.rodada_inicio }}" ]; then
            CMD+=(--rodada-inicio "${{ inputs.rodada_inicio }}")
          fi
          if [ -n "${{ inputs.rodada_fim }}" ]; then
            CMD+=(--rodada-fim "${{ inputs.rodada_fim }}")
          fi
          echo "Executando: ${CMD[*]}"
          "${CMD[@]}"

      - name: Regenerar auditorias do site
        if: ${{ inputs.dry_run == 'false' }}
        run: |
          python scripts/gerar_auditoria_cobertura_resultados.py
          python scripts/gerar_relatorio_fontes_melhores_momentos.py

      - name: Commitar JSONs se mudaram
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "dados-br/melhores-momentos.json"
            "dados-br/melhores-momentos-manual.json"
            "dados-br/relatorio-substituicao-fontes.json"
            "dados-br/auditoria-cobertura-resultados.json"
            "dados-br/auditoria-fontes-melhores-momentos.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Nada mudou — sem commit."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Após atualizar com origin/main, nada mudou — sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Substitui fontes dos melhores momentos por GE/Cazé/Prime - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; tentando de novo sobre origin/main..."
            sleep 3
          done

          echo "ERRO: push falhou após 5 tentativas."
          exit 1
