name: Atualizar resultados

on:
  # Roda 1x ao dia: 09:33 UTC (06:33 Brasilia).
  # Resultados de jogos passados nao mudam mais; 1x ao dia eh suficiente.
  schedule:
    - cron: '33 9 * * *'

  # Permite rodar manualmente
  workflow_dispatch:

  # Roda tambem quando o script ou workflow forem alterados
  push:
    paths:
      - 'atualizar_resultados.py'
      - '.github/workflows/atualizar-resultados.yml'

permissions:
  contents: write

# Concurrency GLOBAL do repositorio: compartilha grupo com os outros workflows
# de escrita, garantindo que apenas UM rode por vez.
concurrency:
  group: bolao-brasileirao-write
  cancel-in-progress: false

jobs:
  atualizar:
    name: Buscar resultados e publicar resultados.json
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar resultados e gerar resultados.json
        run: python atualizar_resultados.py

      - name: Conferir se resultados.json foi gerado
        run: |
          if [ ! -f resultados.json ]; then
            echo "ERRO: resultados.json nao foi gerado"
            exit 1
          fi
          echo "resultados.json gerado com sucesso."
          echo "Tamanho: $(wc -c < resultados.json) bytes"

      - name: Commitar resultados.json com retry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add resultados.json

          if git diff --staged --quiet; then
            echo "Sem mudancas em resultados.json - nada a commitar."
            exit 0
          fi

          git commit -m "Atualizar resultados.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

          MAX_TENTATIVAS=5
          for tentativa in $(seq 1 $MAX_TENTATIVAS); do
            echo "Tentativa $tentativa/$MAX_TENTATIVAS de push..."
            if git push; then
              echo "Push bem-sucedido na tentativa $tentativa."
              exit 0
            fi
            echo "Push falhou. Fazendo pull --rebase e tentando de novo..."
            git pull --rebase --autostash || true
            sleep 3
          done

          echo "ERRO: Push falhou apos $MAX_TENTATIVAS tentativas."
          exit 1
