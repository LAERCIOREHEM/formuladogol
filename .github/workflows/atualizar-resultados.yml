name: Atualizar resultados

on:
  # Roda automaticamente 1x ao dia: 09:33 UTC (06:33 Brasilia).
  # Resultados de jogos passados nao mudam mais; 1x ao dia eh suficiente.
  schedule:
    - cron: '33 9 * * *'

  # Permite rodar manualmente
  workflow_dispatch:

  # Roda tambem quando o script ou workflow forem alterados
  push:
    paths:
      - 'atualizar_resultados.py'
      - '.github/workflows/atualizar-resultados.yml'

permissions:
  contents: write

concurrency:
  group: atualizar-resultados-brasileirao
  cancel-in-progress: true

jobs:
  atualizar:
    name: Buscar resultados e publicar resultados.json
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar resultados e gerar resultados.json
        run: python atualizar_resultados.py

      - name: Conferir se resultados.json foi gerado
        run: |
          if [ ! -f resultados.json ]; then
            echo "ERRO: resultados.json nao foi gerado"
            exit 1
          fi
          echo "resultados.json gerado com sucesso."
          echo "Tamanho: $(wc -c < resultados.json) bytes"

      - name: Commitar resultados.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add resultados.json

          if git diff --staged --quiet; then
            echo "Sem mudancas em resultados.json - nada a commitar."
          else
            git commit -m "Atualizar resultados.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"
            git push
            echo "Commit realizado com sucesso."
          fi
