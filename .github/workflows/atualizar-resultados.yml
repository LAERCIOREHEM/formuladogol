name: Atualizar resultados do Brasileirão

on:
  # Roda 1x por dia como fallback: 09:33 BRT (12:33 UTC).
  # Minuto :33 deslocado de proposito para NAO coincidir com o :00/:05 do
  # atualizar-tudo (a cada 5 min), com o fairplay (:45) nem com jogos (:23).
  schedule:
    - cron: '33 12 * * *'

  workflow_dispatch:

  push:
    paths:
      - 'atualizar_resultados.py'
      - '.github/workflows/atualizar-resultados.yml'

permissions:
  contents: write

# GRUPO GLOBAL DE ESCRITA (repo-write-main). Serializa toda escrita no main.
# cancel-in-progress: false -> execucoes enfileiram, nunca se cancelam.
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  atualizar:
    name: Buscar resultados e publicar resultados.json
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Buscar resultados e gerar resultados.json
        run: python atualizar_resultados.py

      - name: Conferir se resultados.json foi gerado
        run: |
          if [ ! -f resultados.json ]; then
            echo "ERRO: resultados.json nao foi gerado pelo atualizar_resultados.py"
            exit 1
          fi
          python -m json.tool resultados.json > /dev/null
          echo "resultados.json gerado e validado com sucesso."
          echo "Primeiras linhas:"
          head -n 20 resultados.json

      # Estrategia de push ROBUSTA E PADRONIZADA (modelo melhores-momentos).
      - name: Commitar resultados.json com push robusto
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "resultados.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Sem mudancas em resultados.json - nada a commitar."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Apos atualizar com origin/main, nada mudou - sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualizar resultados.json - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; recalculando sobre origin/main mais recente..."
            sleep 3
          done

          echo "ERRO: Push falhou apos 5 tentativas."
          exit 1
