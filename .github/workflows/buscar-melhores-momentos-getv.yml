name: Buscar melhores momentos Brasileirão oficiais

on:
  workflow_dispatch:
    inputs:
      modo:
        description: "Tipo de execução dos melhores momentos oficiais"
        required: true
        default: "incremental"
        type: choice
        options:
          - backfill
          - incremental
      rodada_inicio:
        description: "Rodada inicial. Vazio = usar config/rodadas recentes."
        required: false
        default: ""
      rodada_fim:
        description: "Rodada final. Vazio = usar config/rodadas recentes."
        required: false
        default: ""
      max_search_total:
        description: "Limite de search.list em canais oficiais na etapa reforçada"
        required: true
        default: "25"
      max_consultas_por_jogo:
        description: "Consultas por jogo em cada canal oficial"
        required: true
        default: "2"
  # 3 vezes ao dia. GitHub Actions usa UTC: 02:20, 11:20 e 17:20 UTC
  # equivale aproximadamente a 23:20, 08:20 e 14:20 BRT.
  schedule:
    - cron: '20 2,11,17 * * *'

permissions:
  contents: write

concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  buscar:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validar scripts offline
        run: |
          python -m py_compile scripts/buscar_melhores_momentos_getv.py
          python -m py_compile scripts/substituir_fontes_preferidas_mm.py
          python -m py_compile scripts/gerar_auditoria_cobertura_resultados.py
          python -m py_compile scripts/gerar_relatorio_fontes_melhores_momentos.py
          python scripts/buscar_melhores_momentos_getv.py --dry-run --modo incremental
          python scripts/substituir_fontes_preferidas_mm.py --selftest
          python scripts/gerar_relatorio_fontes_melhores_momentos.py --dry-run

      - name: Buscar vídeos prioritários na GE TV por playlists
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODO: ${{ inputs.modo }}
          INPUT_RODADA_INICIO: ${{ inputs.rodada_inicio }}
          INPUT_RODADA_FIM: ${{ inputs.rodada_fim }}
        shell: bash
        run: |
          set -euo pipefail

          MODO="${INPUT_MODO:-incremental}"
          if [ "${EVENT_NAME}" = "schedule" ]; then
            MODO="incremental"
          fi

          CMD=(python scripts/buscar_melhores_momentos_getv.py --modo "$MODO")
          if [ -n "${INPUT_RODADA_INICIO:-}" ]; then
            CMD+=(--rodada-inicio "${INPUT_RODADA_INICIO}")
          fi
          if [ -n "${INPUT_RODADA_FIM:-}" ]; then
            CMD+=(--rodada-fim "${INPUT_RODADA_FIM}")
          fi

          echo "Executando: ${CMD[*]}"
          "${CMD[@]}"

      - name: Sanear e buscar fontes preferidas com fallback UOL após 48h
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RODADA_INICIO: ${{ inputs.rodada_inicio }}
          INPUT_RODADA_FIM: ${{ inputs.rodada_fim }}
          INPUT_MAX_SEARCH_TOTAL: ${{ inputs.max_search_total }}
          INPUT_MAX_CONSULTAS_POR_JOGO: ${{ inputs.max_consultas_por_jogo }}
        shell: bash
        run: |
          set -euo pipefail

          MAX_SEARCH="${INPUT_MAX_SEARCH_TOTAL:-25}"
          MAX_POR_JOGO="${INPUT_MAX_CONSULTAS_POR_JOGO:-2}"

          CMD=(python scripts/substituir_fontes_preferidas_mm.py \
            --max-search-total "$MAX_SEARCH" \
            --max-consultas-por-jogo "$MAX_POR_JOGO" \
            --paginas-getv 2 \
            --paginas-caze 12 \
            --paginas-prime 8)

          if [ -n "${INPUT_RODADA_INICIO:-}" ]; then
            CMD+=(--rodada-inicio "${INPUT_RODADA_INICIO}")
          fi
          if [ -n "${INPUT_RODADA_FIM:-}" ]; then
            CMD+=(--rodada-fim "${INPUT_RODADA_FIM}")
          fi

          echo "Executando: ${CMD[*]}"
          "${CMD[@]}"

      - name: Bloquear vídeos de jogos não encerrados ou fontes não autorizadas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from scripts.substituir_fontes_preferidas_mm import chave_jogo_dict, preferido

          resultados = json.loads(Path('resultados.json').read_text(encoding='utf-8')).get('resultados') or []
          ids = {str(j.get('event_id') or j.get('id') or '') for j in resultados if str(j.get('event_id') or j.get('id') or '')}
          chaves = {chave_jogo_dict(j) for j in resultados}
          erros = []

          for arquivo in ['dados-br/melhores-momentos.json', 'dados-br/melhores-momentos-manual.json']:
              dados = json.loads(Path(arquivo).read_text(encoding='utf-8'))
              for key, item in (dados.get('jogos') or {}).items():
                  event_id = str(item.get('event_id') or '')
                  chave = str(item.get('chave') or '')
                  if not chave and item.get('rodada') and item.get('mandante') and item.get('visitante'):
                      chave = chave_jogo_dict({
                          'rodada': item.get('rodada'),
                          'mandante': {'nome': item.get('mandante')},
                          'visitante': {'nome': item.get('visitante')},
                      })
                  if not ((event_id and event_id in ids) or (chave and chave in chaves)):
                      erros.append(f'{arquivo}:{key}: jogo ainda não está em resultados.json')
                  if not preferido(item):
                      erros.append(f'{arquivo}:{key}: fonte não autorizada ({item.get("fonte") or item.get("channel_title") or "sem fonte"})')

          if erros:
              raise SystemExit('Validação de melhores momentos falhou:\n- ' + '\n- '.join(erros[:30]))
          print(f'OK: {len(ids)} resultados; todos os vínculos pertencem a jogos encerrados e fontes autorizadas.')
          PY

      - name: Gerar auditorias da aba Resultados e das fontes
        run: |
          python scripts/gerar_auditoria_cobertura_resultados.py
          python scripts/gerar_relatorio_fontes_melhores_momentos.py

      - name: Commitar JSONs se mudaram
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "dados-br/melhores-momentos.json"
            "dados-br/melhores-momentos-manual.json"
            "dados-br/getv-playlists.json"
            "dados-br/auditoria-melhores-momentos.json"
            "dados-br/auditoria-cobertura-resultados.json"
            "dados-br/auditoria-fontes-melhores-momentos.json"
            "dados-br/relatorio-substituicao-fontes.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Nenhuma mudança nos JSONs de melhores momentos. Nada para commitar."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Após atualizar com origin/main, nada mudou — sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualizar melhores momentos Brasileirão oficiais - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; tentando novamente sobre origin/main mais recente..."
            sleep 3
          done

          echo "ERRO: Push falhou após 5 tentativas."
          exit 1
