name: Buscar melhores momentos GE TV

on:
  workflow_dispatch:
    inputs:
      modo:
        description: "Tipo de execução"
        required: true
        default: "backfill"
        type: choice
        options:
          - backfill
          - incremental
      rodada_inicio:
        description: "Rodada inicial. Deixe vazio para usar config."
        required: false
        default: ""
      rodada_fim:
        description: "Rodada final. Deixe vazio para usar config."
        required: false
        default: ""
  # Incremental reduzido: 3 vezes ao dia para economizar cota/commits.
  # GitHub Actions usa UTC; abaixo equivale aprox. a 23h20, 08h20 e 14h20 BRT.
  # Para backfill ou rodadas específicas, use Run workflow manualmente.
  schedule:
    - cron: '20 2,11,17 * * *'

permissions:
  contents: write

# Este workflow também faz git push no main.
# Usa a mesma fila dos demais workflows para evitar corrida de push.
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  buscar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validar script
        run: |
          python -m py_compile scripts/buscar_melhores_momentos_getv.py
          python -m py_compile scripts/gerar_auditoria_cobertura_resultados.py
          python scripts/buscar_melhores_momentos_getv.py --dry-run --modo incremental

      - name: Buscar vídeos da GE TV
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODO: ${{ inputs.modo }}
          INPUT_RODADA_INICIO: ${{ inputs.rodada_inicio }}
          INPUT_RODADA_FIM: ${{ inputs.rodada_fim }}
        shell: bash
        run: |
          set -euo pipefail

          MODO="${INPUT_MODO:-incremental}"
          if [ "${EVENT_NAME}" = "schedule" ]; then
            MODO="incremental"
          fi

          CMD=(python scripts/buscar_melhores_momentos_getv.py --modo "$MODO")

          if [ -n "${INPUT_RODADA_INICIO:-}" ]; then
            CMD+=(--rodada-inicio "${INPUT_RODADA_INICIO}")
          fi
          if [ -n "${INPUT_RODADA_FIM:-}" ]; then
            CMD+=(--rodada-fim "${INPUT_RODADA_FIM}")
          fi

          echo "Executando: ${CMD[*]}"
          "${CMD[@]}"

      - name: Gerar auditoria de cobertura da aba Resultados
        run: python scripts/gerar_auditoria_cobertura_resultados.py

      - name: Commitar JSONs se mudaram
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "dados-br/melhores-momentos.json"
            "dados-br/getv-playlists.json"
            "dados-br/auditoria-melhores-momentos.json"
            "dados-br/auditoria-cobertura-resultados.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Nenhuma mudança nos JSONs de melhores momentos. Nada para commitar."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Após atualizar com origin/main, nada mudou — sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualizar melhores momentos GE TV - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; tentando novamente sobre origin/main mais recente..."
            sleep 3
          done

          echo "ERRO: Push falhou após 5 tentativas."
          exit 1
