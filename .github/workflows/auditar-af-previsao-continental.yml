name: Auditar AF-Previsão Continental

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/atualizar_competicoes_af_previsao.py'
      - 'scripts/af_previsao_continental.py'
      - 'scripts/gerar_probabilidades_brasileirao.py'
      - 'scripts/avaliar_af_previsao.py'
      - 'scripts/af_previsao_backtest.py'
      - 'dados-br/config-af-previsao.json'
      - 'dados-br/historico-af-previsao/**'
      - 'requirements-af-previsao.txt'
      - '.github/workflows/auditar-af-previsao-continental.yml'

permissions:
  contents: read

env:
  OPENBLAS_NUM_THREADS: '1'
  OMP_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'

concurrency:
  group: af-previsao-continental-audit
  cancel-in-progress: true

jobs:
  auditar:
    name: Validar coleta, simulação e alocação de vagas
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-af-previsao.txt

      - name: Instalar dependência numérica
        run: python -m pip install --disable-pip-version-check -r requirements-af-previsao.txt

      - name: Validar sintaxe e testes determinísticos
        run: |
          set -euo pipefail
          python -m py_compile \
            atualizar_espn.py \
            scripts/af_previsao_backtest.py \
            scripts/atualizar_competicoes_af_previsao.py \
            scripts/af_previsao_continental.py \
            scripts/gerar_probabilidades_brasileirao.py \
            scripts/avaliar_af_previsao.py
          python scripts/atualizar_competicoes_af_previsao.py --self-test
          python scripts/af_previsao_continental.py --self-test
          python scripts/gerar_probabilidades_brasileirao.py --self-test
          python scripts/avaliar_af_previsao.py --self-test

      - name: Sincronizar o estado corrente do Brasileirão
        run: |
          set -euo pipefail
          python atualizar_espn.py
          python scripts/gerar_auditoria_calendario.py

      - name: Buscar ao vivo as três competições relacionadas às vagas
        run: python scripts/atualizar_competicoes_af_previsao.py --strict --force --max-age-minutes 0

      - name: Executar integração continental de auditoria
        run: python scripts/gerar_probabilidades_brasileirao.py --simulacoes 2000000 --semente 20260718

      - name: Auditar histórico encadeado e avaliação futura
        run: python scripts/avaliar_af_previsao.py --strict

      - name: Validar artefatos integrados
        run: |
          set -euo pipefail
          for arquivo in \
            dados-br/competicoes-af-previsao/copa-do-brasil.json \
            dados-br/competicoes-af-previsao/libertadores.json \
            dados-br/competicoes-af-previsao/sul-americana.json \
            dados-br/auditoria-competicoes-af-previsao.json \
            dados-br/probabilidades-brasileirao.json \
            dados-br/auditoria-probabilidades.json \
            dados-br/historico-probabilidades.json \
            dados-br/avaliacao-af-previsao.json; do
            test -s "$arquivo"
            python -m json.tool "$arquivo" > /dev/null
            echo "OK $arquivo"
          done

          python - <<'PY'
          import json
          import math
          import sys

          def fail(message):
              raise AssertionError(message)

          def load(path):
              with open(path, encoding='utf-8') as handle:
                  return json.load(handle)

          snapshots = {}
          for chave, arquivo in {
              'copa_do_brasil': 'dados-br/competicoes-af-previsao/copa-do-brasil.json',
              'libertadores': 'dados-br/competicoes-af-previsao/libertadores.json',
              'sul_americana': 'dados-br/competicoes-af-previsao/sul-americana.json',
          }.items():
              data = load(arquivo)
              if data.get('status') != 'ok':
                  fail(f'{chave}: status inválido no snapshot continental: {data.get("status")}')
              if (data.get('competicao') or {}).get('chave') != chave:
                  fail(f'{chave}: chave da competição divergente em {arquivo}')
              if len(data.get('eventos') or []) <= 0:
                  fail(f'{chave}: snapshot sem eventos')
              snapshots[chave] = data

          coleta = load('dados-br/auditoria-competicoes-af-previsao.json')
          if coleta.get('status') != 'ok':
              fail(f'auditoria continental inválida: {coleta.get("falhas")}')
          if len(coleta.get('competicoes') or []) != 3:
              fail('auditoria continental não registrou as três competições')

          previsao = load('dados-br/probabilidades-brasileirao.json')
          auditoria = load('dados-br/auditoria-probabilidades.json')
          config = load('dados-br/config-af-previsao.json')
          simulacoes_configuradas = int(((config.get('execucao_2') or {}).get('simulacoes_monte_carlo')) or 2000000)
          historico = load('dados-br/historico-probabilidades.json')
          avaliacao = load('dados-br/avaliacao-af-previsao.json')

          if previsao.get('status') != 'ok':
              fail(f'AF-Previsão com status inválido: {previsao.get("status")}')
          if auditoria.get('status') != 'ok':
              fail(f'auditoria do AF-Previsão com status inválido: {auditoria.get("status")}')
          if auditoria.get('hash_entrada') != previsao.get('hash_entrada'):
              fail('hash_entrada divergente entre probabilidades e auditoria')
          if len(previsao.get('clubes') or []) != 20:
              fail('AF-Previsão não publicou os 20 clubes')

          snapshots_historicos = historico.get('snapshots') or []
          if not snapshots_historicos:
              fail('histórico do AF-Previsão vazio')
          if historico.get('schema_version', 0) < 4:
              fail('histórico ainda não usa deduplicação por resultado e referência por clube')
          estado_publicado = historico.get('estado_publicado') or {}
          if estado_publicado.get('hash_entrada') != previsao.get('hash_entrada'):
              fail('histórico não referencia o mesmo hash_entrada publicado')
          if not estado_publicado.get('hash_estado_esportivo'):
              fail('histórico sem hash do estado de resultados concluídos')
          estados_historicos = [item.get('hash_estado_esportivo') for item in snapshots_historicos]
          if not all(estados_historicos) or len(estados_historicos) != len(set(estados_historicos)):
              fail('histórico contém estados esportivos repetidos')
          integridade = historico.get('integridade') or {}
          if integridade.get('encadeamento_valido') is not True:
              fail('histórico sem encadeamento SHA-256 válido')
          if integridade.get('hash_final') != snapshots_historicos[-1].get('hash_snapshot'):
              fail('hash final do histórico diverge do último snapshot')

          if avaliacao.get('status') not in {
              'coletando_historico',
              'aguardando_resultados_continentais',
              'avaliacao_concluida',
              'avaliacao_concluida_amostra_reduzida',
          }:
              fail(f'status inválido da avaliação AF: {avaliacao.get("status")}')
          integridade_avaliacao = avaliacao.get('integridade_historico') or {}
          if integridade_avaliacao.get('valido') is not True:
              fail('avaliação detectou histórico inválido')
          if integridade_avaliacao.get('encadeado') is not True:
              fail('avaliação não reconheceu o histórico encadeado')

          def assert_probability_sums(expected):
              clubes = previsao.get('clubes') or []
              for campo, esperado in expected.items():
                  total = sum(float((clube.get('probabilidades_pct') or {}).get(campo, 0.0)) for clube in clubes)
                  if abs(total - esperado) > 0.05:
                      fail(f'soma inválida em {campo}: {total:.6f}; esperado {esperado:.2f}')
              for clube in clubes:
                  distribuicao = clube.get('distribuicao_posicoes_pct') or []
                  if len(distribuicao) != 20:
                      fail(f'{clube.get("clube")}: distribuição de posições sem 20 casas')
                  if abs(sum(float(v) for v in distribuicao) - 100.0) > 0.05:
                      fail(f'{clube.get("clube")}: distribuição de posições não soma 100%')

          schema = int(previsao.get('schema_version') or 0)
          integrado = schema >= 2 and (previsao.get('integracao_continental') or {}).get('status') == 'ok'

          if not integrado:
              # Situação esperada quando a ESPN entrega placar/resultados e tabela ainda
              # temporariamente dessincronizados. O gerador preserva o último JSON válido
              # e migra apenas o histórico, sem criar previsão artificial. Este workflow
              # deve auditar essa preservação segura em vez de falhar com AssertionError
              # genérico antes de a fonte oficial sincronizar.
              zonas_cfg = ((config.get('execucao_2') or {}).get('zonas_base') or {})

              def tamanho_faixa(chave, legado):
                  faixa = zonas_cfg.get(chave)
                  if not isinstance(faixa, list) or len(faixa) != 2:
                      return legado
                  inicio, fim = (int(faixa[0]), int(faixa[1]))
                  if not (1 <= inicio <= fim <= 20):
                      fail(f'config AF inválida em {chave}: {faixa}')
                  return fim - inicio + 1

              assert_probability_sums({
                  'campeao': 100.0,
                  'g4': 400.0,
                  'g6': 600.0,
                  'libertadores_base': 100.0 * tamanho_faixa('libertadores_base', 6),
                  'sul_americana_base': 100.0 * tamanho_faixa('sul_americana_base', 6),
                  'rebaixamento': 400.0,
              })
              simulacoes = int((auditoria.get('simulacao') or {}).get('quantidade') or 0)
              if simulacoes < 200000:
                  fail(f'AF-Previsão preservado sem amostra probabilística válida: {simulacoes}')
              if simulacoes < simulacoes_configuradas:
                  print(f'::warning::Último JSON válido preservado com {simulacoes} simulações; alvo configurado atual: {simulacoes_configuradas}.')
              print('::warning::AF-Previsão continental não foi republicado nesta execução; último JSON válido foi preservado com histórico encadeado porque a base corrente ainda não está apta à publicação integrada.')
              print('AF-Previsão: preservação segura, histórico e avaliação validados')
              sys.exit(0)

          if auditoria.get('schema_version', 0) < 2:
              fail('auditoria integrada publicada em schema antigo')

          assert_probability_sums({
              'campeao': 100.0,
              'g4': 400.0,
              'g6': 600.0,
              'rebaixamento': 400.0,
          })

          total_sula = 0.0
          total_lib = 0.0
          for clube in previsao['clubes']:
              probs = clube['probabilidades_pct']
              for campo in ('campeao', 'libertadores', 'sul_americana', 'rebaixamento'):
                  valor = float(probs[campo])
                  if not (math.isfinite(valor) and 0 <= valor <= 100):
                      fail(f'{clube["clube"]}: probabilidade inválida em {campo}: {valor}')
              total_lib += float(probs['libertadores'])
              total_sula += float(probs['sul_americana'])
              detalhes = clube.get('probabilidades_detalhes') or {}
              for campo in ('libertadores', 'sul_americana', 'rebaixamento'):
                  if campo not in detalhes:
                      fail(f'{clube["clube"]}: detalhe ausente em {campo}')
                  detalhe = detalhes[campo]
                  if int(detalhe.get('simulacoes') or 0) != simulacoes_configuradas:
                      fail(f'{clube["clube"]}: detalhe {campo} sem {simulacoes_configuradas} simulações')
                  if not isinstance(detalhe.get('exibicao'), str):
                      fail(f'{clube["clube"]}: exibição textual ausente em {campo}')
                  if int(detalhe.get('ocorrencias') or 0) < 0:
                      fail(f'{clube["clube"]}: ocorrências negativas em {campo}')
                  if int(detalhe.get('ocorrencias') or 0) == 0:
                      impossivel = detalhe.get('impossivel_estruturalmente') is True or detalhe.get('possivel_estruturalmente') is False
                      exibicao = str(detalhe.get('exibicao') or '')
                      if impossivel:
                          if exibicao not in {'0%', '0,0%'}:
                              fail(f'{clube["clube"]}: impossibilidade estrutural sem exibição 0% em {campo}')
                          if detalhe.get('limite_superior_95_regra_dos_tres_pct') is not None:
                              fail(f'{clube["clube"]}: impossibilidade estrutural não deve usar regra dos três em {campo}')
                      else:
                          if not exibicao.startswith('<'):
                              fail(f'{clube["clube"]}: probabilidade residual sem exibição < em {campo}')
                          if detalhe.get('limite_superior_95_regra_dos_tres_pct') is None:
                              fail(f'{clube["clube"]}: residual sem regra dos três em {campo}')
              decomposicao = clube.get('decomposicao_chances') or {}
              for campo in ('libertadores', 'sul_americana'):
                  bloco = decomposicao.get(campo) or {}
                  if abs(float(bloco.get('soma_vias_pct', -999.0)) - float(probs[campo])) > 0.002:
                      fail(f'{clube["clube"]}: vias de {campo} não fecham')
          # A Libertadores integrada não possui soma fixa de 600%: além das vagas-base
          # do Brasileirão, brasileiros podem entrar por Copa do Brasil, Libertadores e
          # Sul-Americana. Sobreposições geram repasses. Portanto, a soma representa o
          # número médio de brasileiros classificados nos universos simulados.
          alocacao = ((auditoria.get('integracao_continental') or {}).get('alocacao_vagas') or {})
          esperado_lib = alocacao.get('soma_probabilidades_libertadores_pct')
          esperado_sula = alocacao.get('soma_probabilidades_sul_americana_pct')
          if esperado_lib is None or esperado_sula is None:
              fail('auditoria continental sem somas esperadas de Libertadores/Sul-Americana')
          esperado_lib = float(esperado_lib)
          esperado_sula = float(esperado_sula)
          if not (math.isfinite(esperado_lib) and math.isfinite(esperado_sula)):
              fail('auditoria continental publicou somas não finitas')
          if abs(total_lib - esperado_lib) > 0.05:
              fail(
                  f'Libertadores integrada diverge da auditoria do motor: '
                  f'clubes={total_lib:.6f}; auditoria={esperado_lib:.6f}'
              )
          if abs(total_sula - esperado_sula) > 0.05:
              fail(
                  f'Sul-Americana integrada diverge da auditoria do motor: '
                  f'clubes={total_sula:.6f}; auditoria={esperado_sula:.6f}'
              )

          zonas_cfg = ((config.get('execucao_2') or {}).get('zonas_base') or {})
          faixa_lib = zonas_cfg.get('libertadores_base') or [1, 5]
          if not isinstance(faixa_lib, list) or len(faixa_lib) != 2:
              fail(f'config AF inválida em libertadores_base: {faixa_lib}')
          vagas_base_lib = int(faixa_lib[1]) - int(faixa_lib[0]) + 1
          minimo_lib = 100.0 * vagas_base_lib
          # Máximo estrutural atual: vagas-base + campeões da Copa do Brasil,
          # Libertadores e Sul-Americana (até três vias adicionais).
          maximo_lib = 100.0 * (vagas_base_lib + 3)
          if not (minimo_lib - 0.05 <= total_lib <= maximo_lib + 0.05):
              fail(
                  f'Libertadores integrada fora dos limites estruturais: {total_lib:.6f}; '
                  f'esperado entre {minimo_lib:.2f} e {maximo_lib:.2f}'
              )
          if abs(total_sula - 600.0) > 0.05:
              fail(f'Sul-Americana integrada não soma seis vagas finais (600%): {total_sula:.6f}')
          print(
              'AF-Previsão Continental: coleta, simulação, decomposição e histórico validados; '
              f'Libertadores média={total_lib / 100.0:.4f} clubes; Sul-Americana=6 clubes'
          )
          PY
