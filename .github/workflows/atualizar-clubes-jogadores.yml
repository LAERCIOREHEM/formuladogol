name: Atualiza clubes dos jogadores

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Ignorar cache e pesquisar tudo de novo? (SIM/NAO)"
        default: "NAO"
        required: false
      limite:
        description: "Limite de jogadores pendentes nesta rodada (0 = todos)"
        default: "0"
        required: false
      sem_wikipedia:
        description: "Pular fallback Wikipedia? (SIM/NAO)"
        default: "NAO"
        required: false

permissions:
  contents: write

# Mesmo grupo dos demais workflows que escrevem no main.
# Assim ele pode ser disparado junto com outros, mas a escrita fica em fila e não colide.
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  clubes:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Selftest offline
        run: |
          cd "$GITHUB_WORKSPACE/copa2026"
          python buscar_clubes_jogadores.py --selftest

      - name: Buscar clubes atuais dos jogadores
        env:
          FORCE: ${{ github.event.inputs.force || 'NAO' }}
          LIMITE: ${{ github.event.inputs.limite || '0' }}
          SEM_WIKIPEDIA: ${{ github.event.inputs.sem_wikipedia || 'NAO' }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/copa2026"

          ARGS=(--limite "$LIMITE")
          if [[ "$FORCE" == "SIM" ]]; then
            ARGS+=(--force)
          fi
          if [[ "$SEM_WIKIPEDIA" == "SIM" ]]; then
            ARGS+=(--sem-wikipedia)
          fi

          python buscar_clubes_jogadores.py "${ARGS[@]}"

      - name: Validar JSONs gerados
        run: |
          cd "$GITHUB_WORKSPACE"
          python - <<'PY'
          import json
          for p in [
              'copa2026/dados/elencos.json',
              'copa2026/dados/clubes_jogadores_cache.json',
              'copa2026/dados/clubes_jogadores_relatorio.json',
          ]:
              with open(p, encoding='utf-8') as f:
                  json.load(f)
              print('JSON OK:', p)
          PY

      - name: Commit (push robusto se algo mudou)
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          FILES=(
            "copa2026/dados/elencos.json"
            "copa2026/dados/clubes_jogadores_cache.json"
            "copa2026/dados/clubes_jogadores_relatorio.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Nada mudou - sem commit."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Após atualizar com origin/main, nada mudou - sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualiza clubes dos jogadores - automatico"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; tentando novamente sobre origin/main mais recente..."
            sleep 3
          done

          echo "Falha ao enviar após 5 tentativas."
          exit 1
