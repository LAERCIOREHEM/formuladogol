name: Atualiza seleções (elencos + rostos)

on:
  schedule:
    # Fallback interno do GitHub: 1x por HORA no minuto :20.
    # Durante o turbo (ate 02/07/2026 BRT), qualquer disparo agendado entra
    # em modo turbo. O cron externo pode disparar este workflow 1x/hora tambem.
    # IMPORTANTE: se usar cron externo de hora em hora, nao precisa depender
    # deste schedule interno; a concurrency global protege o push.
    - cron: "20 * * * *"
  workflow_dispatch:
    inputs:
      confirmar_execucao:
        description: "Para rodar manualmente fora da janela segura, digite SIM. Dispatch externo sem este campo vira no-op."
        default: "NAO"
        required: false
      minutos_rostos:
        description: "Teto de tempo do robô de rostos (min)"
        default: "18"
        required: false
      limite_rostos:
        description: "Máx. de jogadores por rodada"
        default: "400"
        required: false
      retry_dias:
        description: "Re-tenta 'sem foto' após N dias (0 = re-tenta sempre, modo varredura)"
        default: "0"
        required: false

permissions:
  contents: write

# GRUPO GLOBAL DE ESCRITA (repo-write-main) — o MESMO grupo de todos os
# workflows que escrevem no main. Antes este job ficava isolado no grupo
# "atualizar-selecoes", entao podia rodar em paralelo com atualizar-tudo e
# colidir no push. Agora tudo e serializado.
# cancel-in-progress: false: este job e longo (~25 min) e NUNCA deve ser
# cancelado no meio (perderia trabalho pesado de rostos/fotos).
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  selecoes:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Determinar modo de execução
        id: modo
        env:
          # Turbo de fotos por 2 dias completos no horário de Brasília.
          # Até 02/07/2026 23:59 BRT, schedule interno OU cron externo via
          # workflow_dispatch sem inputs rodam em modo turbo. Depois disso,
          # dispatch externo sem confirmar_execucao=SIM vira no-op.
          TURBO_INICIO_BRT: "2026-07-01"
          TURBO_FIM_BRT: "2026-07-02"
        run: |
          EVENTO="${{ github.event_name }}"
          CONFIRMAR="${{ github.event.inputs.confirmar_execucao || 'NAO' }}"

          HOJE_BRT="$(TZ=America/Sao_Paulo date +%F)"
          HORA_BRT="$(TZ=America/Sao_Paulo date +%H)"
          MINUTO_BRT="$(TZ=America/Sao_Paulo date +%M)"

          HOJE_EPOCH="$(date -u -d "$HOJE_BRT" +%s)"
          TURBO_INICIO_EPOCH="$(date -u -d "$TURBO_INICIO_BRT" +%s)"
          TURBO_FIM_EPOCH="$(date -u -d "$TURBO_FIM_BRT" +%s)"

          if [[ "$EVENTO" == "workflow_dispatch" && "$CONFIRMAR" == "SIM" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "mode=manual" >> "$GITHUB_OUTPUT"
            echo "Execução manual confirmada explicitamente."
          elif (( HOJE_EPOCH >= TURBO_INICIO_EPOCH && HOJE_EPOCH <= TURBO_FIM_EPOCH )); then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "mode=turbo" >> "$GITHUB_OUTPUT"
            echo "Modo turbo de fotos ativo de $TURBO_INICIO_BRT até $TURBO_FIM_BRT no horário de Brasília."
          elif [[ "$EVENTO" == "workflow_dispatch" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "Dispatch externo/manual fora do turbo e sem confirmar_execucao=SIM. Nada a fazer."
          elif [[ "$MINUTO_BRT" == "20" ]] && [[ "$HORA_BRT" =~ ^(03|04|05|06)$ ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "mode=normal" >> "$GITHUB_OUTPUT"
            echo "Janela normal liberada: $HORA_BRT:$MINUTO_BRT BRT."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            echo "Fora da janela normal/turbo. Nada a fazer."
          fi

      - name: Checkout
        if: steps.modo.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        if: steps.modo.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sanidade (selftests offline)
        if: steps.modo.outputs.run == 'true'
        run: |
          cd "$GITHUB_WORKSPACE/copa2026"
          python buscar_selecoes.py --selftest
          python buscar_rostos_jogadores.py --selftest

      - name: Atualizar elencos (ESPN)
        if: steps.modo.outputs.run == 'true' && steps.modo.outputs.mode != 'turbo'
        run: |
          cd "$GITHUB_WORKSPACE/copa2026"
          python buscar_selecoes.py

      - name: Povoar rostos (modo turbo/normal)
        if: steps.modo.outputs.run == 'true'
        env:
          MODO: ${{ steps.modo.outputs.mode }}
          MINUTOS_INPUT: ${{ github.event.inputs.minutos_rostos || '18' }}
          LIMITE_INPUT: ${{ github.event.inputs.limite_rostos || '400' }}
          RETRY_INPUT: ${{ github.event.inputs.retry_dias || '0' }}
        run: |
          cd "$GITHUB_WORKSPACE/copa2026"

          if [[ "$MODO" == "turbo" ]]; then
            echo "Rodando fotos em MODO TURBO: 23 min, limite 600, 10 workers, sem ESPN."
            python buscar_rostos_jogadores.py \
              --minutos 23 \
              --limite 600 \
              --retry-dias 0 \
              --workers 10 \
              --sem-espn
          else
            echo "Rodando fotos em modo $MODO: parâmetros padrão/manuais."
            python buscar_rostos_jogadores.py \
              --minutos "$MINUTOS_INPUT" \
              --limite "$LIMITE_INPUT" \
              --retry-dias "$RETRY_INPUT"
          fi

      # Estrategia de push ROBUSTA E PADRONIZADA (modelo melhores-momentos),
      # adaptada para incluir o DIRETORIO de imagens copa2026/img/jogadores.
      # O cp -a preserva arquivos e diretorios; o reset+clean garante base
      # limpa em origin/main e a reaplicacao repoe os artefatos gerados.
      - name: Commit (push robusto se algo mudou)
        if: steps.modo.outputs.run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          FILES=(
            "copa2026/dados/elencos.json"
            "copa2026/dados/rostos.json"
            "copa2026/dados/rostos_estado.json"
            "copa2026/dados/rostos_creditos.json"
            "copa2026/dados/rostos_relatorio.json"
            "copa2026/img/jogadores"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Nada mudou - sem commit."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Apos atualizar com origin/main, nada mudou - sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Povoa rostos (modo ${{ steps.modo.outputs.mode }}) - automatico"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; recalculando sobre origin/main mais recente..."
            sleep 3
          done

          echo "Falha ao enviar apos 5 tentativas."
          exit 1
