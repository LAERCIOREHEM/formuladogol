name: Mover imagens da raiz

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mover-imagens:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Mover JPG/PNG da raiz para img/jogadores-br
        shell: bash
        run: |
          set -e
          shopt -s nullglob nocaseglob

          DESTINO="img/jogadores-br"
          mkdir -p "$DESTINO"

          moved=0

          for f in *.png *.jpg *.jpeg; do
            [ -e "$f" ] || continue

            nome="$(basename "$f")"
            nome_lower="$(echo "$nome" | tr '[:upper:]' '[:lower:]')"

            # Mantém na raiz os favicons e imagens institucionais do site
            case "$nome_lower" in
              favicon*.png|apple-touch-icon.png|og-image.png)
                echo "Mantendo na raiz: $f"
                continue
                ;;
            esac

            dest="$DESTINO/$nome"

            if [ -e "$dest" ]; then
              echo "Destino já existe: $dest — removendo cópia da raiz: $f"
              git rm "$f"
            else
              echo "Movendo $f -> $dest"
              git mv "$f" "$dest"
            fi

            moved=1
          done

          if [ "$moved" -eq 0 ]; then
            echo "Nenhuma imagem JPG/PNG elegível encontrada na raiz."
            exit 0
          fi

          echo "Arquivos preparados para commit:"
          git status --short

      - name: Commitar e enviar
        shell: bash
        run: |
          if git diff --cached --quiet; then
            echo "Nada para commitar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "Move imagens da raiz para img/jogadores-br"
          git push
