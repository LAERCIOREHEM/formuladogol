name: Atualizar Brasileirao (ESPN)

on:
  # NOVO workflow do modulo Brasileirao (v2, pos-Copa).
  # Roda a cada 10 minutos e substitui a antiga cadeia Terra/Globo:
  #   - tabela.json         -> classificacao via ESPN standings
  #   - jogos.json          -> proximos jogos via ESPN scoreboard
  #   - resultados.json     -> resultados via ESPN scoreboard
  #   - espn_eventos.json   -> indice ESPN para AO VIVO/ONDE ASSISTIR
  #
  # OBS 1: o cron do GitHub e "melhor esforco" (pode atrasar alguns minutos
  #        em horario de pico). O placar EM TEMPO REAL nao depende dele:
  #        o proprio site consulta a ESPN a cada 30s durante os jogos.
  # OBS 2: este workflow NAO toca em nada do modulo copa2026/.
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

  push:
    paths:
      - 'atualizar_espn.py'
      - 'scripts/gerar_estatisticas_brasileirao.py'
      - 'scripts/buscar_lideres_jogadores_espn.py'
      - 'scripts/gerar_estatisticas_competicao_brasileirao.py'
      - 'scripts/gerar_auditoria_estatisticas_brasileirao.py'
      - 'scripts/buscar_detalhes_jogos_brasileirao.py'
      - 'scripts/gerar_auditoria_cobertura_resultados.py'
      - 'scripts/gerar_auditoria_calendario.py'
      - 'scripts/gerar_probabilidades_brasileirao.py'
      - 'scripts/avaliar_af_previsao.py'
      - 'scripts/af_previsao_continental.py'
      - 'scripts/atualizar_competicoes_af_previsao.py'
      - 'scripts/af_previsao_backtest.py'
      - 'dados-br/config-af-previsao.json'
      - 'dados-br/participantes-bolao-classificacao.json'
      - 'dados-br/auditoria-modelos-af-previsao.json'
      - 'dados-br/historico-af-previsao/**'
      - 'dados-br/competicoes-af-previsao/**'
      - 'dados-br/auditoria-competicoes-af-previsao.json'
      - 'requirements-af-previsao.txt'
      - 'dados-br/ajustes-calendario.json'
      - 'dados-br/resultados-manuais.json'
      - 'dados-br/publicos-complementares.json'
      - '.github/workflows/atualizar-brasileirao.yml'

permissions:
  contents: write

# GRUPO GLOBAL DE ESCRITA (repo-write-main) — o mesmo dos demais workflows
# que dao git push no main. Serializa as escritas -> zero corrida de push.
concurrency:
  group: repo-write-main
  cancel-in-progress: false

jobs:
  atualizar:
    name: Buscar dados ESPN e publicar JSONs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-af-previsao.txt

      - name: Instalar dependências do AF-Previsão
        run: python -m pip install --disable-pip-version-check -r requirements-af-previsao.txt

      - name: Mostrar horario da execucao
        run: |
          echo "Horario UTC:"
          date -u '+%d/%m/%Y %H:%M:%S UTC'
          echo "Horario Brasilia:"
          TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M:%S BRT'

      - name: Validar sintaxe e parsers estatísticos
        run: |
          python -m py_compile \
            atualizar_espn.py \
            scripts/buscar_lideres_jogadores_espn.py \
            scripts/buscar_detalhes_jogos_brasileirao.py \
            scripts/gerar_estatisticas_brasileirao.py \
            scripts/gerar_estatisticas_competicao_brasileirao.py \
            scripts/gerar_auditoria_estatisticas_brasileirao.py \
            scripts/af_previsao_backtest.py \
            scripts/af_previsao_continental.py \
            scripts/atualizar_competicoes_af_previsao.py \
            scripts/gerar_probabilidades_brasileirao.py \
            scripts/avaliar_af_previsao.py
          python atualizar_espn.py --selftest
          python scripts/buscar_lideres_jogadores_espn.py --self-test
          python scripts/buscar_detalhes_jogos_brasileirao.py --self-test
          python scripts/atualizar_competicoes_af_previsao.py --self-test
          python scripts/af_previsao_continental.py --self-test
          python scripts/gerar_probabilidades_brasileirao.py --self-test
          python scripts/avaliar_af_previsao.py --self-test

      # --- DADOS DO BRASILEIRAO (100% ESPN) ---
      # O script grava os quatro JSONs de uma vez e falha antes de publicar
      # se a tabela nao preservar exatamente os 20 nomes canonicos do Ranking.
      - name: Atualizar tabela, jogos, resultados e eventos (ESPN)
        id: espn
        run: python atualizar_espn.py

      - name: Gerar auditoria estrutural do calendário
        run: python scripts/gerar_auditoria_calendario.py

      - name: Buscar estatísticas por jogo finalizado
        run: python scripts/buscar_detalhes_jogos_brasileirao.py

      - name: Buscar líderes oficiais de gols e assistências
        run: python scripts/buscar_lideres_jogadores_espn.py

      - name: Gerar estatísticas e Ranking Vivo de desempenho
        run: python scripts/gerar_estatisticas_brasileirao.py

      - name: Atualizar competições que alteram as vagas continentais
        run: python scripts/atualizar_competicoes_af_previsao.py --max-age-minutes 45

      - name: Gerar AF-Previsão integrado e simular o restante do campeonato
        run: python scripts/gerar_probabilidades_brasileirao.py

      - name: Auditar histórico e preparar avaliação final do AF-Previsão
        run: python scripts/avaliar_af_previsao.py --strict

      - name: Gerar estatísticas gerais da competição
        run: python scripts/gerar_estatisticas_competicao_brasileirao.py

      - name: Auditar estatísticas do Brasileirão
        run: python scripts/gerar_auditoria_estatisticas_brasileirao.py

      - name: Gerar auditoria de cobertura da aba Resultados
        run: python scripts/gerar_auditoria_cobertura_resultados.py

      - name: Conferir e validar JSONs gerados
        run: |
          set -euo pipefail
          echo "Arquivos JSON presentes e validos:"
          for arq in tabela.json espn_eventos.json jogos.json resultados.json dados-br/ajustes-calendario.json dados-br/resultados-manuais.json dados-br/publicos-complementares.json dados-br/calendario-completo.json dados-br/auditoria-calendario.json dados-br/estatisticas.json dados-br/ranking-desempenho.json dados-br/auditoria-ranking-desempenho.json dados-br/jogadores.json dados-br/lideres-jogadores.json dados-br/auditoria-lideres-jogadores.json dados-br/jogos-detalhes.json dados-br/auditoria-jogos-detalhes.json dados-br/estatisticas-competicao.json dados-br/auditoria-estatisticas.json dados-br/auditoria-cobertura-resultados.json dados-br/competicoes-af-previsao/copa-do-brasil.json dados-br/competicoes-af-previsao/libertadores.json dados-br/competicoes-af-previsao/sul-americana.json dados-br/auditoria-competicoes-af-previsao.json dados-br/probabilidades-brasileirao.json dados-br/probabilidades-bolao.json dados-br/participantes-bolao-classificacao.json dados-br/auditoria-probabilidades.json dados-br/historico-probabilidades.json dados-br/avaliacao-af-previsao.json; do
            if [ ! -f "$arq" ]; then
              echo "ERRO: $arq nao foi gerado."
              exit 1
            fi
            python -m json.tool "$arq" > /dev/null
            echo "  OK   $arq"
          done
          # Travas extras: todos os JSONs principais precisam vir da ESPN
          # e a tabela precisa preservar os 20 times do Ranking.
          python - <<'PY'
          import json
          for arq in ['tabela.json', 'jogos.json', 'resultados.json']:
              d = json.load(open(arq, encoding='utf-8'))
              assert d.get('fonte') == 'ESPN', f'{arq}: fonte nao e ESPN'
          t = json.load(open('tabela.json', encoding='utf-8'))
          assert len(t.get('tabela') or []) == 20, 'tabela sem 20 times'
          j = json.load(open('jogos.json', encoding='utf-8'))
          assert isinstance(j.get('jogos'), list), 'jogos.json sem lista jogos'
          r = json.load(open('resultados.json', encoding='utf-8'))
          assert isinstance(r.get('resultados'), list), 'resultados.json sem lista resultados'
          print('  OK   JSONs principais: fonte ESPN; tabela com 20 times')
          stats = json.load(open('dados-br/estatisticas.json', encoding='utf-8'))
          rank = json.load(open('dados-br/ranking-desempenho.json', encoding='utf-8'))
          assert len(stats.get('clubes') or []) == 20, 'estatisticas.json sem 20 clubes'
          assert len(rank.get('ranking') or []) == 20, 'ranking-desempenho.json sem 20 clubes'
          for item in rank.get('ranking') or []:
              for campo in ['indice_final', 'ataque', 'defesa', 'dominio', 'eficiencia', 'disciplina']:
                  assert campo in item, f'ranking sem campo {campo}'
          aud_rank = json.load(open('dados-br/auditoria-ranking-desempenho.json', encoding='utf-8'))
          assert aud_rank.get('clubes_no_ranking') == 20, 'auditoria-ranking sem 20 clubes'
          jogadores = json.load(open('dados-br/jogadores.json', encoding='utf-8'))
          assert isinstance(jogadores.get('artilharia'), list), 'jogadores.json sem artilharia'
          assert isinstance(jogadores.get('assistencias'), list), 'jogadores.json sem assistencias'
          assert isinstance(jogadores.get('participacoes_gol'), list), 'jogadores.json sem participacoes_gol'
          lideres = json.load(open('dados-br/lideres-jogadores.json', encoding='utf-8'))
          assert lideres.get('status') == 'valido', 'lideres-jogadores.json inválido'
          assert len(lideres.get('artilharia') or []) >= 40, 'artilharia completa truncada'
          assert len(lideres.get('assistencias') or []) >= 20, 'assistências completas truncadas'
          assert int(lideres['artilharia'][0].get('gols') or 0) > 0, 'líder de gols inválido'
          assert int(lideres['assistencias'][0].get('assistencias') or 0) > 0, 'líder de assistências inválido'
          assert len(jogadores.get('artilharia') or []) >= 40, 'jogadores.json sem artilharia completa'
          assert len(jogadores.get('assistencias') or []) >= 20, 'jogadores.json sem assistências completas'
          detalhes = json.load(open('dados-br/jogos-detalhes.json', encoding='utf-8'))
          assert isinstance(detalhes.get('jogos'), dict), 'jogos-detalhes.json sem objeto jogos'
          auditoria = json.load(open('dados-br/auditoria-jogos-detalhes.json', encoding='utf-8'))
          assert isinstance(auditoria.get('falhas'), list), 'auditoria-jogos-detalhes.json sem lista falhas'
          assert 'total_com_publico' in auditoria, 'auditoria-jogos-detalhes sem contagem de público'
          assert auditoria.get('total_inconsistencias_eventos') == 0, 'há gols/cartões inconsistentes'
          validados = int(detalhes.get('total_eventos_validados') or 0)
          pendentes = int(detalhes.get('total_eventos_pendentes_detalhes') or 0)
          assert validados + pendentes == detalhes.get('total_jogos'), 'há jogo sem eventos validados ou pendência manual declarada'
          for item in (detalhes.get('jogos') or {}).values():
              validacao = item.get('validacao_eventos') or {}
              if validacao.get('pendente_detalhes') is True:
                  assert item.get('resultado_manual') is True, 'pendência de detalhes permitida apenas para resultado manual confirmado'
          competicao = json.load(open('dados-br/estatisticas-competicao.json', encoding='utf-8'))
          assert len(competicao.get('gols_por_clube') or []) == 20, 'estatísticas da competição sem 20 clubes'
          assert all(len(item.get('marcadores') or []) >= 5 for item in competicao.get('gols_por_clube') or []), 'há clube com menos de cinco marcadores'
          assert isinstance(competicao.get('sequencias'), dict), 'estatísticas da competição sem sequências'
          assert isinstance(competicao.get('performance_por_partida'), dict), 'estatísticas da competição sem performance'
          auditoria_stats = json.load(open('dados-br/auditoria-estatisticas.json', encoding='utf-8'))
          assert auditoria_stats.get('status') == 'ok', 'auditoria de estatísticas falhou'
          cobertura = json.load(open('dados-br/auditoria-cobertura-resultados.json', encoding='utf-8'))
          assert isinstance(cobertura.get('resumo'), dict), 'auditoria-cobertura-resultados.json sem resumo'
          calendario = json.load(open('dados-br/auditoria-calendario.json', encoding='utf-8'))
          assert isinstance(calendario.get('resumo'), dict), 'auditoria-calendario.json sem resumo'
          resumo_cal = calendario['resumo']
          assert resumo_cal.get('partidas_mapeadas_calendario_completo') == 380, 'calendário não tem 380 partidas'
          assert resumo_cal.get('rodadas_com_10_jogos') == 38, 'calendário não tem 38 rodadas íntegras'
          assert resumo_cal.get('clubes_com_38_jogos') == 20, 'há clube sem 38 jogos'
          assert resumo_cal.get('confrontos_com_ida_e_volta') == 190, 'ida e volta incompletas'
          completo = json.load(open('dados-br/calendario-completo.json', encoding='utf-8'))
          assert completo.get('total_partidas') == 380, 'calendario-completo.json sem 380 partidas'
          competicoes = {}
          for chave, arquivo in {
              'copa_do_brasil': 'dados-br/competicoes-af-previsao/copa-do-brasil.json',
              'libertadores': 'dados-br/competicoes-af-previsao/libertadores.json',
              'sul_americana': 'dados-br/competicoes-af-previsao/sul-americana.json',
          }.items():
              snapshot = json.load(open(arquivo, encoding='utf-8'))
              assert (snapshot.get('competicao') or {}).get('chave') == chave, f'{arquivo}: competição divergente'
              competicoes[chave] = snapshot
          aud_copas = json.load(open('dados-br/auditoria-competicoes-af-previsao.json', encoding='utf-8'))
          assert isinstance(aud_copas.get('competicoes'), list), 'auditoria continental sem competições'

          previsao = json.load(open('dados-br/probabilidades-brasileirao.json', encoding='utf-8'))
          assert previsao.get('status') == 'ok', 'AF-Previsão com status inválido'
          assert previsao.get('base_corrente', {}).get('partidas_totais') == 380, 'AF-Previsão sem 380 partidas'
          assert previsao.get('base_corrente', {}).get('partidas_concluidas') + previsao.get('base_corrente', {}).get('partidas_restantes') == 380, 'AF-Previsão com partição inválida'
          clubes_prev = previsao.get('clubes') or []
          assert len(clubes_prev) == 20, 'AF-Previsão sem 20 clubes'
          assert previsao.get('total_previsoes_partidas') == previsao.get('base_corrente', {}).get('partidas_restantes'), 'AF-Previsão sem previsão para todos os jogos restantes'
          assert len(previsao.get('partidas_restantes') or []) == previsao.get('base_corrente', {}).get('partidas_restantes'), 'lista de partidas previstas incompleta'
          # Validação compatível com o schema publicado. O schema legado usa
          # Libertadores-base G6 (600%); o modelo continental usa a faixa definida
          # no config (atualmente G5 = 500%). Em caso de coleta inconsistente, o
          # gerador preserva o snapshot anterior e a trava deve validar a versão
          # preservada — não aplicar a regra de outro schema.
          schema_prev = int(previsao.get('schema_version') or 1)
          config_prev = json.load(open('dados-br/config-af-previsao.json', encoding='utf-8'))
          execucao_cfg = config_prev.get('execucao_2') or {}
          simulacoes_configuradas = int(execucao_cfg.get('simulacoes_monte_carlo') or 2000000)
          zonas_cfg = (execucao_cfg.get('zonas_base') or {})

          def tamanho_faixa(chave, legado):
              faixa = zonas_cfg.get(chave)
              if schema_prev < 2 or not isinstance(faixa, list) or len(faixa) != 2:
                  return legado
              inicio, fim = (int(faixa[0]), int(faixa[1]))
              assert 1 <= inicio <= fim <= 20, f'config AF inválida em {chave}: {faixa}'
              return fim - inicio + 1

          esperados = {
              'campeao': 100,
              'g4': 400,
              'g6': 600,
              'libertadores_base': 100 * tamanho_faixa('libertadores', 6),
              'sul_americana_base': 100 * tamanho_faixa('sul_americana', 6),
              'rebaixamento': 400,
          }
          for campo, esperado in esperados.items():
              total = sum(float(item['probabilidades_pct'][campo]) for item in clubes_prev)
              assert abs(total - esperado) <= 0.02, (
                  f'AF-Previsão schema {schema_prev}: soma inválida em {campo}: '
                  f'{total}; esperado {esperado}'
              )
          print(f'  OK   Somas AF-Previsão validadas conforme schema {schema_prev}: {esperados}')
          assert all(abs(sum(item.get('distribuicao_posicoes_pct') or []) - 100) <= 0.02 for item in clubes_prev), 'AF-Previsão: distribuição de posições inválida'

          integrado = previsao.get('schema_version', 0) >= 2 and (previsao.get('integracao_continental') or {}).get('status') == 'ok'
          snapshots_prontos = all(snapshot.get('status') == 'ok' and snapshot.get('eventos') for snapshot in competicoes.values())
          if integrado:
              assert snapshots_prontos, 'previsão integrada publicada com snapshots continentais inválidos'
              total_sula = sum(float(item['probabilidades_pct']['sul_americana']) for item in clubes_prev)
              assert abs(total_sula - 600) <= 0.02, f'Sul-Americana integrada não soma 600%: {total_sula}'
              for item in clubes_prev:
                  for campo in ('libertadores', 'sul_americana'):
                      detalhe = (item.get('probabilidades_detalhes') or {}).get(campo) or {}
                      simulacoes_detalhe = int(detalhe.get('simulacoes') or 0)
                      assert simulacoes_detalhe >= 200000, f'{item["clube"]}: detalhe sem amostra probabilística válida em {campo}'
                      if simulacoes_detalhe < simulacoes_configuradas:
                          print(f'::warning::{item["clube"]}: previsão preservada com {simulacoes_detalhe} simulações; a próxima publicação íntegra usará {simulacoes_configuradas}.')
                      assert isinstance(detalhe.get('exibicao'), str), f'{item["clube"]}: exibição ausente em {campo}'
                  decomposicao = item.get('decomposicao_chances') or {}
                  lib = decomposicao.get('libertadores') or {}
                  sula = decomposicao.get('sul_americana') or {}
                  assert abs(float(lib.get('soma_vias_pct', -1)) - float(item['probabilidades_pct']['libertadores'])) <= 0.002, f'{item["clube"]}: vias da Libertadores não fecham'
                  assert abs(float(sula.get('soma_vias_pct', -1)) - float(item['probabilidades_pct']['sul_americana'])) <= 0.002, f'{item["clube"]}: vias da Sul-Americana não fecham'
              print('  OK   AF-Previsão continental integrado e decomposto por via')
          else:
              # Estado transitório legítimo: os snapshots continentais podem estar
              # prontos enquanto a previsão publicada é a anterior (schema 1),
              # preservada pelo gerador quando os feeds da ESPN estão fora de
              # sincronia (ex.: resultado entrou em resultados.json mas a tabela
              # oficial ainda não computou os pontos). O estado preservado já é
              # validado acima: status ok, somas fechando e hash íntegro com a
              # auditoria. A integração acontece naturalmente na execução
              # seguinte, quando a ESPN sincroniza.
              if snapshots_prontos and aud_copas.get('status') == 'ok':
                  print('::warning::Snapshots continentais prontos; previsão anterior (schema 1) preservada aguardando sincronização da ESPN. Integração ocorrerá na próxima execução.')
              else:
                  print('::warning::AF-Previsão anterior preservado porque a coleta continental ainda não ficou íntegra')
          aud_prev = json.load(open('dados-br/auditoria-probabilidades.json', encoding='utf-8'))
          assert aud_prev.get('status') == 'ok', 'auditoria do AF-Previsão falhou'
          simulacoes_publicadas = int(aud_prev.get('simulacao', {}).get('quantidade') or 0)
          assert simulacoes_publicadas >= 200000, 'AF-Previsão sem amostra probabilística válida'
          if simulacoes_publicadas < simulacoes_configuradas:
              print(f'::warning::Último AF-Previsão válido preservado com {simulacoes_publicadas} simulações; alvo configurado atual: {simulacoes_configuradas}.')
          else:
              assert simulacoes_publicadas >= simulacoes_configuradas, 'AF-Previsão abaixo da quantidade configurada'
          assert aud_prev.get('simulacao', {}).get('convergencia', {}).get('maior_diferenca_entre_metades_pontos_percentuais', 99) <= 1.0, 'AF-Previsão sem convergência suficiente'
          assert aud_prev.get('hash_entrada') == previsao.get('hash_entrada'), 'hash divergente entre previsão e auditoria'
          if integrado:
              assert aud_prev.get('schema_version', 0) >= 2, 'auditoria integrada em schema antigo'
              assert isinstance(aud_prev.get('integracao_continental'), dict), 'auditoria sem integração continental'
          bolao = json.load(open('dados-br/probabilidades-bolao.json', encoding='utf-8'))
          participantes_bolao = json.load(open('dados-br/participantes-bolao-classificacao.json', encoding='utf-8'))
          assert bolao.get('status') == 'ok', 'projeção do bolão com status inválido'
          assert int(bolao.get('simulacoes') or 0) >= 200000, 'projeção do bolão sem amostra probabilística válida'
          nomes_config = {item.get('nome') for item in (participantes_bolao.get('participantes') or [])}
          linhas_bolao = bolao.get('participantes') or []
          assert len(linhas_bolao) == len(nomes_config) >= 2, 'projeção do bolão com participantes incompletos'
          assert {item.get('nome') for item in linhas_bolao} == nomes_config, 'nomes divergentes na projeção do bolão'
          soma_titulo_bolao = sum(float(item.get('chance_titulo_pct') or 0) for item in linhas_bolao)
          assert abs(soma_titulo_bolao - 100.0) <= 0.02, f'chances do bolão não somam 100%: {soma_titulo_bolao}'
          assert all(0 <= float(item.get('chance_top3_pct') or 0) <= 100 for item in linhas_bolao), 'chance top 3 inválida'
          assert all(0 <= float(item.get('chance_nao_pagar_pct') or 0) <= 100 for item in linhas_bolao), 'chance de não pagar inválida'
          print(f'  OK   AF-Previsão do bolão: {len(linhas_bolao)} participantes; título soma {soma_titulo_bolao:.6f}%')
          hist_prev = json.load(open('dados-br/historico-probabilidades.json', encoding='utf-8'))
          assert hist_prev.get('total_snapshots', 0) >= 1, 'histórico do AF-Previsão vazio'
          assert (hist_prev.get('snapshots') or [])[-1].get('hash_entrada') == previsao.get('hash_entrada'), 'histórico não termina no estado publicado'
          assert hist_prev.get('schema_version', 0) >= 3, 'histórico sem encadeamento da Execução 5'
          integridade_hist = hist_prev.get('integridade') or {}
          assert integridade_hist.get('encadeamento_valido') is True, 'histórico sem integridade declarada'
          assert integridade_hist.get('hash_final') == (hist_prev.get('snapshots') or [])[-1].get('hash_snapshot'), 'hash final do histórico divergente'
          avaliacao = json.load(open('dados-br/avaliacao-af-previsao.json', encoding='utf-8'))
          assert avaliacao.get('status') in {'coletando_historico', 'aguardando_resultados_continentais', 'avaliacao_concluida', 'avaliacao_concluida_amostra_reduzida'}, 'status inválido da avaliação AF'
          assert (avaliacao.get('integridade_historico') or {}).get('valido') is True, 'avaliação detectou histórico inválido'
          assert (avaliacao.get('integridade_historico') or {}).get('encadeado') is True, 'avaliação não reconheceu a cadeia do histórico'
          print('  OK   Estatísticas, calendário e AF-Previsão gerados')
          PY

      # Estrategia de push ROBUSTA E PADRONIZADA (modelo melhores-momentos):
      # guarda os artefatos gerados -> fetch + reset --hard origin/main ->
      # reaplica os arquivos -> commit -> push. Nunca gera conflito artificial
      # de rebase em arquivos-artefato, mesmo sob concorrencia real.
      - name: Commitar JSONs juntos com push robusto
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FILES=(
            "tabela.json"
            "espn_eventos.json"
            "jogos.json"
            "resultados.json"
            "dados-br/estatisticas.json"
            "dados-br/ranking-desempenho.json"
            "dados-br/auditoria-ranking-desempenho.json"
            "dados-br/jogadores.json"
            "dados-br/lideres-jogadores.json"
            "dados-br/auditoria-lideres-jogadores.json"
            "dados-br/jogos-detalhes.json"
            "dados-br/auditoria-jogos-detalhes.json"
            "dados-br/estatisticas-competicao.json"
            "dados-br/auditoria-estatisticas.json"
            "dados-br/auditoria-cobertura-resultados.json"
            "dados-br/calendario-completo.json"
            "dados-br/auditoria-calendario.json"
            "dados-br/competicoes-af-previsao/copa-do-brasil.json"
            "dados-br/competicoes-af-previsao/libertadores.json"
            "dados-br/competicoes-af-previsao/sul-americana.json"
            "dados-br/auditoria-competicoes-af-previsao.json"
            "dados-br/probabilidades-brasileirao.json"
            "dados-br/probabilidades-bolao.json"
            "dados-br/auditoria-probabilidades.json"
            "dados-br/historico-probabilidades.json"
            "dados-br/avaliacao-af-previsao.json"
          )

          if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
            echo "Sem mudancas nos JSONs - nada a commitar."
            exit 0
          fi

          TMP_DIR="$(mktemp -d)"
          for f in "${FILES[@]}"; do
            if [[ -e "$f" ]]; then
              mkdir -p "$TMP_DIR/$(dirname "$f")"
              cp -a "$f" "$TMP_DIR/$f"
            fi
          done

          for i in 1 2 3 4 5; do
            echo "Tentativa de push $i/5..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            for f in "${FILES[@]}"; do
              if [[ -e "$TMP_DIR/$f" ]]; then
                rm -rf "$f"
                mkdir -p "$(dirname "$f")"
                cp -a "$TMP_DIR/$f" "$f"
              fi
            done

            if [[ -z "$(git status --porcelain -- "${FILES[@]}")" ]]; then
              echo "Apos atualizar com origin/main, nada mudou - sem commit."
              exit 0
            fi

            git add -- "${FILES[@]}"
            git commit -m "Atualizar dados e estatisticas Brasileirao (ESPN) - $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M BRT')"

            if git push origin HEAD:main; then
              echo "Push OK na tentativa $i."
              exit 0
            fi

            echo "Push rejeitado na tentativa $i; recalculando sobre origin/main mais recente..."
            sleep 3
          done

          echo "ERRO: Push falhou apos 5 tentativas."
          exit 1
